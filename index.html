<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaperWave</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #4caf50;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: var(--font-family);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        /* --- UI ELEMENTS --- */
        #taskbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 50px;
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--ui-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #taskbar.hidden {
            transform: translateX(-50%) translateY(100px);
        }
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .clock {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .score-display {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 2px;
        }
        .clock.night-highlight,
        .score-display.night-highlight {
            color: #ffcc00 !important;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }
        #time-bar-container {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            z-index: 99;
            transition: opacity 0.5s;
        }
        #time-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--text-color);
            transition: width 1s linear;
        }
        #pause-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--ui-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--ui-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 110;
            color: var(--text-color);
            font-size: 20px;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #pause-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        #pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #pause-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        .menu-box {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: white;
            min-width: 200px;
        }
        .menu-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }
        #joystick-zone {
            position: absolute;
            bottom: 80px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 90;
            transition: opacity 0.3s;
        }
        #joystick-zone.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s;
        }
        #hint {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 50;
        }
        #shop-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        #tunnel-score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-color);
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px var(--text-color);
            z-index: 50;
            display: none;
        }
        #tunnel-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
            text-align: center;
        }
        #tunnel-timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-color);
            font-size: 4rem;
            font-weight: bold;
            z-index: 50;
            display: none;
            text-shadow: 0 0 20px var(--text-color);
        }
        /* === SHOP COLOR PICKER MENU === */
        #color-picker-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }
        #color-picker-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        #color-picker-menu h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }
        .color-options {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .color-btn:hover {
            transform: scale(1.15);
            border-color: white;
        }
        .color-btn.selected {
            border-color: #4caf50;
            box-shadow: 0 0 15px #4caf50;
        }
        .color-btn.default {
            background: linear-gradient(135deg, #ffffff 50%, #1a1a1a 50%);
        }
        .color-btn.red { background: #ff4444; }
        .color-btn.blue { background: #4444ff; }
        .color-btn.yellow { background: #ffcc00; }
        .color-btn.green { background: #4caf50; }
        .color-btn.cyan { background: #00bcd4; }
        /* === ASSEMBLER & SHIP UI === */
        #assembler-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }
        #assembler-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        #assembler-menu h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            color: #4caf50;
        }
        .build-progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .build-progress-bar {
            height: 100%;
            width: 0%;
            background: #4caf50;
            transition: width 0.1s linear;
        }
        /* === UNIVERSAL INTERACT BUTTON === */
        #interact-btn {
            position: fixed;
            bottom: 500px;
            left: 50px;
            background: rgba(170, 170, 170, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }
        #interact-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        #interact-btn:active {
            transform: scale(0.95);
        }
        /* === SHIP INTERIOR CONTROL PANEL (TOP-LEFT) === */
        #ship-control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #ship-control-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #ship-control-panel h3 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: #4caf50;
            text-align: center;
        }
        #exit-control-btn {
            background: rgba(255, 68, 68, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #exit-control-btn:hover {
            background: rgba(255, 68, 68, 1);
            transform: scale(1.05);
        }
        #exit-control-btn:active {
            transform: scale(0.95);
        }
        /* === SHIP INTERIOR HINT === */
        #ship-interior-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="hint">Fly to the Portal</div>
    <div id="shop-hint">Fly to corridor end to Exit</div>
    <div id="tunnel-hint">Hold to Fly Up • Release to Fall Down</div>
    <div id="ship-interior-hint">Walk to green zone to exit ship</div>
    <div id="tunnel-score">0</div>
    <div id="tunnel-timer">3</div>
    <div id="pause-btn">❚❚</div>
    <div id="time-bar-container">
        <div id="time-bar-fill"></div>
    </div>
    <div id="joystick-zone">
        <div class="joystick-base" id="joy-base">
            <div class="joystick-stick" id="joy-stick"></div>
        </div>
    </div>
    <div id="taskbar">
        <div class="clock-container">
            <div class="clock" id="clock">00:00</div>
            <div class="score-display" id="score-display">Best: 0</div>
        </div>
    </div>
    <div id="pause-menu">
        <div class="menu-box">
            <h2>PAUSED</h2>
            <button class="menu-btn" id="resume-btn">RESUME</button>
            <button class="menu-btn" id="exit-btn">EXIT</button>
        </div>
    </div>
    <!-- === COLOR PICKER MENU === -->
    <div id="color-picker-menu">
        <h2 id="picker-title">Select Color</h2>
        <div class="color-options">
            <div class="color-btn default" data-color="default"></div>
            <div class="color-btn red" data-color="red"></div>
            <div class="color-btn blue" data-color="blue"></div>
            <div class="color-btn yellow" data-color="yellow"></div>
            <div class="color-btn green" data-color="green"></div>
            <div class="color-btn cyan" data-color="cyan"></div>
        </div>
    </div>
    <!-- === ASSEMBLER MENU === -->
    <div id="assembler-menu">
        <h2>ASSEMBLY</h2>
        <p id="assembler-status">Ready to Build</p>
        <button class="menu-btn" id="build-btn" style="border-color: #4caf50; color: #4caf50;">BUILD SHIP</button>
        <div class="build-progress" id="build-progress-container">
            <div class="build-progress-bar" id="build-progress-bar"></div>
        </div>
    </div>
    <!-- === UNIVERSAL INTERACT BUTTON === -->
    <div id="interact-btn">ENTER SHIP</div>
    <!-- === SHIP CONTROL PANEL (TOP-LEFT) === -->
    <div id="ship-control-panel">
        <h3>SHIP CONTROL</h3>
        <button id="exit-control-btn">EXIT-CONTROL</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        // --- CONFIG & STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const MODE = {
            MAP: 'MAP',
            TUNNEL: 'TUNNEL',
            SHOP: 'SHOP',
            PAUSED: 'PAUSED',
            SHIP_INTERIOR: 'SHIP_INTERIOR'
        };
        let currentState = MODE.MAP;
        let lastTime = 0;

        // Player (Map)
        const player = {
            x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15, speed: 0.5, friction: 0.96
        };

        // === PLAYER TRAIL (MAP) ===
        const mapTrail = [];
        const mapTrailMaxLength = 100;

        // Portals
        const portal = { x: 500, y: -500, radius: 40, active: true, color: '#00f2ff' };
        const shopPortal = { x: -600, y: 0, radius: 40, active: true, color: '#ff4444' };

        // Joystick
        const joystick = {
            active: false, originX: 0, originY: 0, dx: 0, dy: 0, maxRadius: 35
        };

        // Time System
        const CYCLE_DURATION_SECONDS = 720;
        const HOURS_IN_DAY = 24;
        let gameTimeSeconds = 6 * 3600;

        // Tunnel Game State
        let tunnelPoints = [];
        let tunnelGap = 100;
        let tunnelSpeed = 3.5;
        let tunnelMoveSpeed = 3.5;
        let tunnelScore = 0;
        let tunnelPlayerY = 0;
        let tunnelIsClimbing = false;
        let tunnelTrail = [];
        const tunnelTrailMaxLength = 200;
        const playerX = 100;
        let tunnelTimer = 0;
        const TUNNEL_START_DELAY = 1.0;

        // High Score
        let highScore = parseInt(localStorage.getItem('tunnelHighScore')) || 0;
        document.getElementById('score-display').innerText = `Best: ${highScore}`;

        // === SHOP STATE ===
        const shopConfig = {
            gridSize: 100,
            gridCount: 10,
            corridorWidth: 200,
            shopSize: 400,
            wallThickness: 10
        };
        let shopPlayer = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15 };
        let shopCamera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
        let currentShop = null;
        let activeColorPicker = null;

        // === SHOP WALLS ===
        const shopWalls = [
            { x: -500, y: -500, w: 350, h: 10, type: 'collision' },
            { x: 150, y: -500, w: 350, h: 10, type: 'collision' },
            { x: -500, y: 490, w: 350, h: 10, type: 'collision' },
            { x: 150, y: 490, w: 350, h: 10, type: 'collision' },
            { x: -500, y: -500, w: 10, h: 350, type: 'collision' },
            { x: -500, y: 150, w: 10, h: 350, type: 'collision' },
            { x: 490, y: -500, w: 10, h: 350, type: 'collision' },
            { x: 490, y: 150, w: 10, h: 350, type: 'collision' }
        ];

        // === SHOP ZONES ===
        const shopZones = {
            trail: {
                name: 'TRAIL',
                x: -500, y: -500, w: 400, h: 400,
                colorKey: 'trailColor',
                cashRegister: { x: -400, y: -400, w: 200, h: 200, type: 'cash' }
            },
            player: {
                name: 'PLAYER',
                x: 100, y: -500, w: 400, h: 400,
                colorKey: 'playerColor',
                cashRegister: { x: 200, y: -400, w: 200, h: 200, type: 'cash' }
            },
            tunnel: {
                name: 'TUNNEL',
                x: -500, y: 100, w: 400, h: 400,
                colorKey: 'tunnelColor',
                cashRegister: { x: -400, y: 200, w: 200, h: 200, type: 'cash' }
            },
            shape: {
                name: 'SHAPE',
                x: 100, y: 100, w: 400, h: 400,
                colorKey: 'playerShape',
                cashRegister: { x: 200, y: 200, w: 200, h: 200, type: 'cash' }
            }
        };
        const exitZones = [
            { x: -75, y: -500, w: 150, h: 20, name: 'exit' },
            { x: -75, y: 480, w: 150, h: 20, name: 'exit' },
            { x: -500, y: -75, w: 20, h: 150, name: 'exit' },
            { x: 480, y: -75, w: 20, h: 150, name: 'exit' }
        ];

        // === CUSTOMIZATION STATE ===
        let customization = {
            playerColor: localStorage.getItem('playerColor') || 'default',
            trailColor: localStorage.getItem('trailColor') || 'default',
            tunnelColor: localStorage.getItem('tunnelColor') || 'default',
            playerShape: localStorage.getItem('playerShape') || 'triangle'
        };

        // === COLORS ===
        const colorValues = {
            default: { light: '#ffffff', dark: '#1a1a1a' },
            red: { light: '#ff0000', dark: '#ff0000' },
            blue: { light: '#4444ff', dark: '#0000cc' },
            yellow: { light: '#ffff00', dark: '#cc9900' },
            green: { light: '#ADFF2F', dark: '#2e7d32' },
            cyan: { light: '#00bcd4', dark: '#00838f' }
        };

        // === HANGAR & SPACESHIP CONFIG ===
        const BLOCK_SIZE = 50;
        const hangar = {
            x: -2600,
            y: -1200,
            w: 15 * BLOCK_SIZE,
            h: 25 * BLOCK_SIZE,
            color: '#cccccc'
        };
        const hangarWalls = [
            { x: hangar.x, y: hangar.y, w: 10, h: hangar.h },
            { x: hangar.x + hangar.w - 10, y: hangar.y, w: 10, h: hangar.h },
            { x: hangar.x, y: hangar.y, w: hangar.w, h: 10 }
        ];

        // === ASSEMBLER ===
        const assembler = {
            x: hangar.x + hangar.w / 2 - 125,
            y: hangar.y + 100,
            w: 5 * BLOCK_SIZE,
            h: 5 * BLOCK_SIZE
        };
        const assemblerWalls = [
            { x: assembler.x, y: assembler.y, w: 10, h: assembler.h},
            { x: assembler.x + assembler.w - 10, y: assembler.y, w: 10, h: assembler.h},
            { x: assembler.x, y: assembler.y, w: assembler.w, h: 10 },
            { x: assembler.x, y: assembler.y + 250, w: assembler.w, h: 10 }
        ];
        const terminalZone = {
            x: assembler.x,
            y: assembler.y + assembler.h + 10,
            w: assembler.w,
            h: 40
        };

        // Spaceship Config
        const shipConfig = {
            w: 5 * BLOCK_SIZE,
            h: 5 * BLOCK_SIZE,
            size: 120
        };
        let spaceship = {
            x: assembler.x + shipConfig.w / 2,
            y: assembler.y + shipConfig.h / 2,
            vx: 0, vy: 0, angle: 0,
            built: false,
            building: false,
            buildProgress: 0,
            alpha: 0
        };

        // === SHIP INTERIOR STATE ===
        let inShip = false;
        let inShipInterior = false;
        let inCockpitZone = false;
        let shipInteriorPlayer = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15 };

        // Ship Interior Walls
        const shipInteriorWalls = [
            // 1. самая верхняя стена
            { x: -40, y: -250, w: 80, h: 10 },
            // 2. кабина
            { x: -40, y: -240, w: 10, h: 160 }, 
            { x: 30, y: -240, w: 10, h: 160 },
            // 3. расширение
            { x: -80, y: -90, w: 40, h: 10 },   // левое плечо
            { x: 40, y: -90, w: 40, h: 10 },    // правое плечо
            { x: -80, y: -80, w: 10, h: 70 },  // левый бок
            { x: 70, y: -80, w: 10, h: 70 },   // правый бок
            // 4. крылья
            { x: -140, y: -10, w: 70, h: 10 },   // левый верхний выступ
            { x: 70, y: -10, w: 70, h: 10 },    // правый верхний выступ
            { x: -140, y: 0, w: 10, h: 40 },   // крайний левый торец
            { x: 130, y: 0, w: 10, h: 40 },   // крайний правый торец
            { x: -140, y: 40, w: 70, h: 10 },   // низ левого крыла
            { x: 70, y: 40, w: 70, h: 10 },    // низ правого крыла
            // 5. низ
            { x: -80, y: 40, w: 10, h: 20 },   // левая ножка
            { x: 70, y: 40, w: 10, h: 20 },    // правая ножка
            { x: -80, y: 60, w: 30, h: 10 },   // нижняя грань слева
            { x: 50, y: 60, w: 30, h: 10 }     // нижняя грань справа
        ];

        // Ship Interior Exit Zone (green line at bottom)
        const shipInteriorExitZone = {
            x: -50,
            y: 60,
            w: 100,
            h: 10,
            color: '#4caf50'

        // --- JOYSTICK INPUT ---
        function handleStart(e) {
            if (currentState !== MODE.MAP && currentState !== MODE.SHOP && currentState !== MODE.SHIP_INTERIOR) return;
            joystick.active = true;
            const rect = joyBase.getBoundingClientRect();
            joystick.originX = rect.left + rect.width / 2;
            joystick.originY = rect.top + rect.height / 2;
            handleMove(e);
        }
        function handleMove(e) {
            if (!joystick.active) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaX = clientX - joystick.originX;
            const deltaY = clientY - joystick.originY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const angle = Math.atan2(deltaY, deltaX);
            const clampedDist = Math.min(distance, joystick.maxRadius);
            joystick.dx = (clampedDist / joystick.maxRadius) * Math.cos(angle);
            joystick.dy = (clampedDist / joystick.maxRadius) * Math.sin(angle);
            const stickX = joystick.dx * joystick.maxRadius;
            const stickY = joystick.dy * joystick.maxRadius;
            joyStick.style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;
        }
        function handleEnd() {
            joystick.active = false;
            joystick.dx = 0;
            joystick.dy = 0;
            joyStick.style.transform = `translate(-50%, -50%)`;
        }
        joyBase.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        // === COLLISION DETECTION ===
        function checkWallCollision(newX, newY) {
            const playerRadius = shopPlayer.size;
            for (const wall of shopWalls) {
                const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                const dx = newX - closestX;
                const dy = newY - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < playerRadius) {
                    return true;
                }
            }
            return false;
        }

        // === SHIP INTERIOR COLLISION ===
        function checkShipInteriorCollision(newX, newY, radius) {
            for (const wall of shipInteriorWalls) {
                const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                const dx = newX - closestX;
                const dy = newY - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < radius) {
                    return true;
                }
            }
            return false;
        }

        // === HANGAR COLLISION ===
        function checkHangarCollision(newX, newY, radius) {
            for (const wall of hangarWalls) {
                const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                const dx = newX - closestX;
                const dy = newY - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < radius) {
                    return true;
                }
            }
            if (!inShip && !inShipInterior) {
                for (const wall of assemblerWalls) {
                    const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                    const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                    const dx = newX - closestX;
                    const dy = newY - closestY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < radius) {
                        return true;
                    }
                }
            }
            return false;
        }

        function checkShopEntry() {
            for (const [key, shop] of Object.entries(shopZones)) {
                if (shopPlayer.x > shop.x && shopPlayer.x < shop.x + shop.w &&
                    shopPlayer.y > shop.y && shopPlayer.y < shop.y + shop.h) {
                    if (currentShop !== key) {
                        currentShop = key;

            if (currentShop !== null) {

        function checkCashRegister() {

        function updateShop(deltaTime) {
            if (joystick.active) {
                shopPlayer.vx += joystick.dx * player.speed;
                shopPlayer.vy += joystick.dy * player.speed;
            }
            shopPlayer.vx *= player.friction;
            shopPlayer.vy *= player.friction;
            const newX = shopPlayer.x + shopPlayer.vx;
            const newY = shopPlayer.y + shopPlayer.vy;
            if (!checkWallCollision(newX, shopPlayer.y)) {
                shopPlayer.x = newX;
            }
            if (!checkWallCollision(shopPlayer.x, newY)) {
                shopPlayer.y = newY;
            }
            if (Math.abs(shopPlayer.vx) > 0.1 || Math.abs(shopPlayer.vy) > 0.1) {
                shopPlayer.angle = Math.atan2(shopPlayer.vy, shopPlayer.vx);

            shopCamera.zoom += (shopCamera.targetZoom - shopCamera.zoom) * 5 * deltaTime;

        // --- TUNNEL FUNCTIONS ---
        function startTunnel() {
            currentState = MODE.TUNNEL;
            resetTunnel();

            tunnelTimerEl.style.display = 'block';

        function resetTunnel() {
            tunnelScore = 0;
            tunnelPoints = [];
            tunnelTrail = [];
            tunnelPlayerY = canvas.height / 2;
            tunnelIsClimbing = false;
            tunnelTimer = TUNNEL_START_DELAY;
            tunnelGap = Math.max(150, Math.floor(canvas.height * 0.25));
            tunnelSpeed = 3.5;
            initTunnel();
            const startTunnel = getTunnelAt(playerX);
            tunnelPlayerY = startTunnel.y + tunnelGap / 2;
            tunnelScoreEl.innerText = '0';
        }

        function initTunnel() {
            tunnelPoints = [];
            let startY = (canvas.height - tunnelGap) / 2;
            startY = Math.max(30, Math.min(canvas.height - tunnelGap - 30, startY));
            for (let i = 0; i < 40; i++) {
                tunnelPoints.push({ x: i * 40, y: startY });
            }
            for (let i = 40; i < 80; i++) {
                addPoint();
            }
        }

        function addPoint() {
            const lastPoint = tunnelPoints[tunnelPoints.length - 1];
            const stepX = 40;
            const x = lastPoint.x + stepX;
            let dy = (Math.random() > 0.5) ? stepX : -stepX;
            let candidateY = lastPoint.y + dy;
            const minY = 30;
            const maxY = canvas.height - tunnelGap - 30;
            if (candidateY < minY || candidateY > maxY) {
                dy = -dy;
                candidateY = lastPoint.y + dy;
            }
            const newY = Math.max(minY, Math.min(maxY, candidateY));
            tunnelPoints.push({ x, y: newY });
        }

        function getTunnelAt(x) {
            for (let i = 0; i < tunnelPoints.length - 1; i++) {
                if (x >= tunnelPoints[i].x && x <= tunnelPoints[i + 1].x) {
                    const t = (x - tunnelPoints[i].x) / (tunnelPoints[i + 1].x - tunnelPoints[i].x);
                    return {
                        y: tunnelPoints[i].y + t * (tunnelPoints[i + 1].y - tunnelPoints[i].y)
                    };
                }
            }
            return { y: canvas.height / 2 };
        }

        function updateTunnel(deltaTime) {
            if (tunnelTimer > 0) {
                tunnelTimer -= deltaTime;
                if (tunnelTimer <= 0) {
                    tunnelTimer = 0;
                    tunnelTimerEl.style.display = 'none';
                } else {
                    tunnelTimerEl.innerText = Math.ceil(tunnelTimer);
                }
            } else {
                if (tunnelIsClimbing) {
                    tunnelPlayerY -= tunnelMoveSpeed;
                } else {
                    tunnelPlayerY += tunnelMoveSpeed;
                }
            }
            tunnelScore += deltaTime * 15;
            tunnelScoreEl.innerText = Math.floor(tunnelScore);
            if (tunnelScore > highScore) {
                highScore = Math.floor(tunnelScore);
                localStorage.setItem('tunnelHighScore', highScore);
                document.getElementById('score-display').innerText = `Best: ${highScore}`;
            }
            for (let p of tunnelPoints) {
                p.x -= tunnelSpeed;
            }
            if (tunnelPoints.length > 0 && tunnelPoints[0].x < -100) {
                tunnelPoints.shift();
                addPoint();
            }
            tunnelTrail.push({ x: playerX, y: tunnelPlayerY });
            for (let t of tunnelTrail) {
                t.x -= tunnelSpeed;
            }
            if (tunnelTrail.length > tunnelTrailMaxLength) {
                tunnelTrail.shift();
            }
            const tunnel = getTunnelAt(playerX);
            if (tunnelPlayerY < tunnel.y || tunnelPlayerY > tunnel.y + tunnelGap) {
                onTunnelCrash();
                return;
            }
        }

        function onTunnelCrash() {
            canvas.style.filter = 'brightness(1.5)';
            setTimeout(() => {
                canvas.style.filter = '';
            }, 100);
            resetTunnel();
        }

        // --- MAP LOGIC ---
        function updateMap(deltaTime) {
            const timeScale = (HOURS_IN_DAY * 3600) / CYCLE_DURATION_SECONDS;
            gameTimeSeconds += deltaTime * timeScale;
            if (gameTimeSeconds >= HOURS_IN_DAY * 3600) {
                gameTimeSeconds -= HOURS_IN_DAY * 3600;
            }
            if (spaceship.building) {
                spaceship.buildProgress += deltaTime * 20;
                if (spaceship.buildProgress >= 100) {
                    spaceship.buildProgress = 100;
                    spaceship.building = false;
                    spaceship.built = true;
                    spaceship.alpha = 1;
                    assemblerStatus.innerText = "Ship Ready!";
                    buildProgressContainer.style.display = 'none';
                } else {
                    buildProgressBar.style.width = `${spaceship.buildProgress}%`;
                    spaceship.alpha = spaceship.buildProgress / 100;
                }
            }

            // Control Logic
            if (inShip) {
                if (joystick.active) {
                    spaceship.vx += joystick.dx * player.speed * 1.5;
                    spaceship.vy += joystick.dy * player.speed * 1.5;
                }
                spaceship.vx *= 0.98;
                spaceship.vy *= 0.98;
                spaceship.x += spaceship.vx;
                spaceship.y += spaceship.vy;
                if (Math.abs(spaceship.vx) > 0.1 || Math.abs(spaceship.vy) > 0.1) {
                    spaceship.angle = Math.atan2(spaceship.vy, spaceship.vx);
                }
                player.x = spaceship.x;
                player.y = spaceship.y;
                player.angle = spaceship.angle;
            } else if (!inShipInterior) {
                if (joystick.active) {
                    player.vx += joystick.dx * player.speed;
                    player.vy += joystick.dy * player.speed;
                }
                player.vx *= player.friction;
                player.vy *= player.friction;
                const nextX = player.x + player.vx;
                const nextY = player.y + player.vy;
                if (!checkHangarCollision(nextX, player.y, player.size)) {
                    player.x = nextX;
                }
                if (!checkHangarCollision(player.x, nextY, player.size)) {
                    player.y = nextY;
                }
                if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
                    player.angle = Math.atan2(player.vy, player.vx);
                }
            }

            // === UPDATE PLAYER TRAIL ===
            const controlledEntity = inShip ? spaceship : player;
            const speed = Math.sqrt(controlledEntity.vx * controlledEntity.vx + controlledEntity.vy * controlledEntity.vy);
            if (speed > 0.1 && !inShipInterior && !inShip) {
                mapTrail.push({ x: controlledEntity.x, y: controlledEntity.y, alpha: 1, isShip: inShip });
                const maxLen = inShip ? mapTrailMaxLength * 2 : mapTrailMaxLength;
                if (mapTrail.length > maxLen) {
                    mapTrail.shift();
                }
            }
            for (let i = 0; i < mapTrail.length; i++) {
                mapTrail[i].alpha -= 0.01;
                if (mapTrail[i].alpha <= 0) {
                    mapTrail.splice(i, 1);
                    i--;
                }
            }

            // === PORTAL COLLISION ===
            const dx = player.x - portal.x;
            const dy = player.y - portal.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (!inShip && !inShipInterior && dist < portal.radius + player.size) {
                startTunnel();
            }
            const shopDx = player.x - shopPortal.x;
            const shopDy = player.y - shopPortal.y;
            const shopDist = Math.sqrt(shopDx * shopDx + shopDy * shopDy);
            if (!inShip && !inShipInterior && shopDist < shopPortal.radius + player.size) {
                enterShop();
            }
            checkAssembler();
        }

        // === SHIP INTERIOR UPDATE ===
        function updateShipInterior(deltaTime) {
            if (joystick.active) {
                shipInteriorPlayer.vx += joystick.dx * player.speed * 0.8;
                shipInteriorPlayer.vy += joystick.dy * player.speed * 0.8;
            }
            shipInteriorPlayer.vx *= player.friction;
            shipInteriorPlayer.vy *= player.friction;
            const newX = shipInteriorPlayer.x + shipInteriorPlayer.vx;
            const newY = shipInteriorPlayer.y + shipInteriorPlayer.vy;
            if (!checkShipInteriorCollision(newX, shipInteriorPlayer.y, shipInteriorPlayer.size)) {
                shipInteriorPlayer.x = newX;
            }
            if (!checkShipInteriorCollision(shipInteriorPlayer.x, newY, shipInteriorPlayer.size)) {
                shipInteriorPlayer.y = newY;
            }
            // === UPDATE ANGLE FOR TRIANGLE ROTATION ===
            if (Math.abs(shipInteriorPlayer.vx) > 0.1 || Math.abs(shipInteriorPlayer.vy) > 0.1) {
                shipInteriorPlayer.angle = Math.atan2(shipInteriorPlayer.vy, shipInteriorPlayer.vx);
            }

            // === ПРОВЕРКА ЗОНЫ КАБИНЫ ===
            if (shipInteriorPlayer.x > shipInteriorCockpitZone.x &&
                shipInteriorPlayer.x < shipInteriorCockpitZone.x + shipInteriorCockpitZone.w &&
                shipInteriorPlayer.y > shipInteriorCockpitZone.y &&
                shipInteriorPlayer.y < shipInteriorCockpitZone.y + shipInteriorCockpitZone.h) {
                inCockpitZone = true;
                interactBtn.innerText = "ENTER";
                interactBtn.classList.add('visible');
            } else {
                inCockpitZone = false;
                if (!inShip) {
                    interactBtn.classList.remove('visible');
                }
            }

            // Check exit zone
            if (shipInteriorPlayer.x > shipInteriorExitZone.x &&
                shipInteriorPlayer.x < shipInteriorExitZone.x + shipInteriorExitZone.w &&
                shipInteriorPlayer.y > shipInteriorExitZone.y &&
                shipInteriorPlayer.y < shipInteriorExitZone.y + shipInteriorExitZone.h) {
                inShipInterior = false;
                currentState = MODE.MAP;
                player.x = spaceship.x;
                player.y = spaceship.y + shipConfig.h / 2 + 50;
                player.vx = 0;
                player.vy = 0;
                shipInteriorHint.style.display = 'none';
                hint.style.display = 'block';
                hint.innerText = "Fly to the Portal";
            }
        }

        // --- ENVIRONMENT & COLORS ---
        function updateEnvironment(deltaTime) {
            const timeScale = (HOURS_IN_DAY * 3600) / CYCLE_DURATION_SECONDS;
            gameTimeSeconds += deltaTime * timeScale;
            if (gameTimeSeconds >= HOURS_IN_DAY * 3600) {
                gameTimeSeconds -= HOURS_IN_DAY * 3600;
            }
            const totalSeconds = Math.floor(gameTimeSeconds);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            document.getElementById('clock').innerText =
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            const noon = 12 * 3600;
            const midnight = 0;
            let distFromNoon;
            if (totalSeconds <= 12 * 3600) {
                distFromNoon = 12 * 3600 - totalSeconds;
            } else {
                distFromNoon = totalSeconds - 12 * 3600;
            }
            const maxDistFromNoon = 12 * 3600;
            let dayFactor = 1 - (distFromNoon / maxDistFromNoon);
            dayFactor = Math.max(0, Math.min(1, dayFactor));
            const rNight = 20, gNight = 20, bNight = 25;
            const rDay = 230, gDay = 235, bDay = 240;
            const r = Math.round(rNight + (rDay - rNight) * dayFactor);
            const g = Math.round(gNight + (gDay - gNight) * dayFactor);
            const b = Math.round(bNight + (bDay - bNight) * dayFactor);
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            const textColor = dayFactor > 0.5 ? '#1a1a1a' : '#ffffff';
            document.documentElement.style.setProperty('--text-color', textColor);
            document.documentElement.style.setProperty('--ui-bg', 'rgba(255, 255, 255, 0.1)');
            const isNight = dayFactor <= 0.5;
            if (isNight) {
                clockEl.classList.add('night-highlight');
                scoreDisplayEl.classList.add('night-highlight');
            } else {
                clockEl.classList.remove('night-highlight');
                scoreDisplayEl.classList.remove('night-highlight');
            }
            const progress = (gameTimeSeconds / (24 * 3600)) * 100;
            document.getElementById('time-bar-fill').style.width = `${progress}%`;
            return { dayFactor, textColor, isNight };
        }

        function getCustomColor(colorKey, colors) {
            const colorName = customization[colorKey];
            if (colorName === 'default') {
                return colors.textColor;
            }
            return colorValues[colorName] ?
                (colors.dayFactor > 0.5 ? colorValues[colorName].dark : colorValues[colorName].light)
                : colors.textColor;
        }

        function getCelestialPosition(gameTimeSeconds) {
            const totalSeconds = 24 * 3600;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const diagonalLength = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height) * 1.5;
            const angle = Math.atan2(canvas.height, canvas.width);
            const sunrise = 6 * 3600;
            const sunset = 18 * 3600;
            let celestialType = 'sun';
            let bodyProgress = 0;
            let isVisible = false;
            if (gameTimeSeconds >= sunrise && gameTimeSeconds < sunset) {
                celestialType = 'sun';
                bodyProgress = (gameTimeSeconds - sunrise) / (sunset - sunrise);
                isVisible = true;
            } else {
                celestialType = 'moon';
                if (gameTimeSeconds >= sunset) {
                    bodyProgress = (gameTimeSeconds - sunset) / (12 * 3600);
                } else {
                    bodyProgress = 0.5 + (gameTimeSeconds / (12 * 3600));
                }
                isVisible = true;
            }
            const distanceAlongLine = (bodyProgress - 0.5) * diagonalLength;
            const x = centerX + Math.cos(angle) * distanceAlongLine;
            const y = centerY + Math.sin(angle) * distanceAlongLine;
            const z = Math.sin(bodyProgress * Math.PI) * 400 - 100;
            return { x, y, z, bodyProgress, celestialType, isVisible };
        }

        // --- DRAWING ---
        function drawMap(colors) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCelestialBodies(colors);
            const gridSize = 100;
            const offsetX = -player.x % gridSize;
            const offsetY = -player.y % gridSize;
            ctx.beginPath();
            ctx.strokeStyle = colors.dayFactor > 0.5 ?
                'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = offsetX; x < canvas.width; x += gridSize) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
            }
            for (let y = offsetY; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);
            ctx.fillStyle = '#dddddd';
            ctx.fillRect(hangar.x, hangar.y, hangar.w, hangar.h);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let x = hangar.x; x <= hangar.x + hangar.w; x += BLOCK_SIZE) {
                ctx.moveTo(x, hangar.y);
                ctx.lineTo(x, hangar.y + hangar.h);
            }
            for (let y = hangar.y; y <= hangar.y + hangar.h; y += BLOCK_SIZE) {
                ctx.moveTo(hangar.x, y);
                ctx.lineTo(hangar.x + hangar.w, y);
            }
            ctx.stroke();
            ctx.fillStyle = '#555555';
            for (const wall of hangarWalls) {
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
            }
            ctx.fillStyle = '#aaaaaa';
            ctx.fillRect(assembler.x, assembler.y, assembler.w, assembler.h);
            ctx.fillStyle = '#333333';
            for (const wall of assemblerWalls) {
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
            }
            ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
            ctx.fillRect(terminalZone.x, terminalZone.y, terminalZone.w, terminalZone.h);
            
            if (spaceship.built || spaceship.building) {
                ctx.save();
                ctx.translate(spaceship.x, spaceship.y);
                const scale = spaceship.building ? (0.5 + 0.5 * spaceship.alpha) : 1;
                ctx.scale(scale, scale);
                ctx.globalAlpha = spaceship.alpha;
                ctx.rotate(spaceship.angle + Math.PI / 2);
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.moveTo(-15 * scale, -90 * scale);
                ctx.lineTo(15 * scale, -90 * scale);
                ctx.lineTo(40 * scale, 50 * scale);
                ctx.lineTo(95 * scale, 30 * scale);
                ctx.lineTo(95 * scale, 85 * scale);
                ctx.lineTo(40 * scale, 120 * scale);
                ctx.lineTo(25 * scale, 100 * scale);
                ctx.lineTo(-25 * scale, 100 * scale);
                ctx.lineTo(-40 * scale, 120 * scale);
                ctx.lineTo(-95 * scale, 85 * scale);
                ctx.lineTo(-95 * scale, 30 * scale);
                ctx.lineTo(-40 * scale, 50 * scale);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            
            ctx.restore();
            
            if (!inShip) {
                drawPlayerTrail(colors);
            }
            
            ctx.save();
            ctx.translate(
                canvas.width / 2 + portal.x - player.x,
                canvas.height / 2 + portal.y - player.y
            );
            ctx.beginPath();
            ctx.arc(0, 0, portal.radius, 0, Math.PI * 2);
            ctx.strokeStyle = portal.color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = portal.color;
            ctx.stroke();
            ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.fill();
            ctx.restore();
            ctx.save();
            ctx.translate(
                canvas.width / 2 + shopPortal.x - player.x,
                canvas.height / 2 + shopPortal.y - player.y
            );
            ctx.beginPath();
            ctx.arc(0, 0, shopPortal.radius, 0, Math.PI * 2);
            ctx.strokeStyle = shopPortal.color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = shopPortal.color;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 68, 68, 0.2)';
            ctx.fill();
            ctx.restore();
            
            if (!inShip && !inShipInterior) {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(player.angle);
                ctx.beginPath();
                ctx.moveTo(player.size, 0);
                ctx.lineTo(-player.size, -player.size / 1.5);
                ctx.lineTo(-player.size, player.size / 1.5);
                ctx.closePath();
                ctx.fillStyle = getCustomColor('playerColor', colors);
                ctx.fill();
                ctx.restore();
            }
            drawCompass(colors);
        }

        function drawPlayerTrail(colors) {
            if (mapTrail.length < 2) return;
            const trailColor = getCustomColor('trailColor', colors);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for (let i = 1; i < mapTrail.length; i++) {
                const point = mapTrail[i];
                const prevPoint = mapTrail[i - 1];
                const alpha = point.alpha * 0.6;
                const widthMultiplier = point.isShip ? 2 : 1;
                ctx.beginPath();
                ctx.moveTo(prevPoint.x - player.x, prevPoint.y - player.y);
                ctx.lineTo(point.x - player.x, point.y - player.y);
                ctx.strokeStyle = trailColor;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = (3 + (i / mapTrail.length) * 4) * widthMultiplier;
                ctx.shadowBlur = 10 * alpha;
                ctx.shadowColor = trailColor;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawCelestialBodies(colors) {
            const celestial = getCelestialPosition(gameTimeSeconds);
            if (!celestial.isVisible) return;
            const baseSize = celestial.celestialType === 'sun' ? 25 : 22;
            const scale = Math.max(0.3, 1 + celestial.z / 600);
            const size = baseSize * scale;
            const alpha = Math.max(0, Math.min(1, 0.4 + celestial.z / 400));
            if (celestial.z < -300) return;
            ctx.save();
            if (celestial.celestialType === 'sun') {
                ctx.shadowBlur = 300 * scale;
                ctx.fillStyle = '#F0E68C';
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(celestial.x, celestial.y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 200 * scale;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(celestial.x, celestial.y, size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.shadowBlur = 180 * scale;
                ctx.shadowColor = '#aaccff';
                ctx.fillStyle = '#f5f8ff';
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(celestial.x, celestial.y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 80 * scale;
                ctx.fillStyle = '#e8f0ff';
                ctx.beginPath();
                ctx.arc(celestial.x, celestial.y, size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawCompass(colors) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const compassRadius = 50;
            const markerWidth = 8;
            const markerArc = Math.PI / 6;
            const dx1 = portal.x - player.x;
            const dy1 = portal.y - player.y;
            const angleToPortal = Math.atan2(dy1, dx1);
            const dx2 = shopPortal.x - player.x;
            const dy2 = shopPortal.y - player.y;
            const angleToShop = Math.atan2(dy2, dx2);
            const dx3 = (hangar.x + hangar.w / 2) - player.x;
            const dy3 = (hangar.y + hangar.h / 2) - player.y;
            const angleToBase = Math.atan2(dy3, dx3);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, 0, Math.PI * 2);
            ctx.strokeStyle = colors.dayFactor > 0.5 ?
                'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, angleToPortal - markerArc / 2, angleToPortal + markerArc / 2);
            ctx.strokeStyle = portal.color;
            ctx.lineWidth = markerWidth;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = portal.color;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, angleToShop - markerArc / 2, angleToShop + markerArc / 2);
            ctx.strokeStyle = shopPortal.color;
            ctx.lineWidth = markerWidth;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = shopPortal.color;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, angleToBase - markerArc / 2, angleToBase + markerArc / 2);
            ctx.strokeStyle = '#4caf50';
            ctx.lineWidth = markerWidth;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#4caf50';
            ctx.stroke();
            ctx.restore();
        }

        function drawShop(colors) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(shopCamera.zoom, shopCamera.zoom);
            ctx.translate(-shopPlayer.x, -shopPlayer.y);
            const halfGrid = (shopConfig.gridCount * shopConfig.gridSize) / 2;
            ctx.fillStyle = colors.dayFactor > 0.5 ? '#e0e0e0' : '#2a2a2a';
            ctx.fillRect(
                -halfGrid, -halfGrid,
                shopConfig.gridCount * shopConfig.gridSize,
                shopConfig.gridCount * shopConfig.gridSize
            );
            ctx.strokeStyle = colors.dayFactor > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let x = -halfGrid; x <= halfGrid; x += shopConfig.gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, -halfGrid);
                ctx.lineTo(x, halfGrid);
                ctx.stroke();
            }
            for (let y = -halfGrid; y <= halfGrid; y += shopConfig.gridSize) {
                ctx.beginPath();
                ctx.moveTo(-halfGrid, y);
                ctx.lineTo(halfGrid, y);
                ctx.stroke();
            }
            for (const [key, shop] of Object.entries(shopZones)) {
                const isActive = (currentShop === key);
                const x = shop.x;
                const y = shop.y;
                const w = shop.w;
                const h = shop.h;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
                if (!isActive) {
                    ctx.fillStyle = 'rgba(200, 200, 200, 0.7)';
                    ctx.fillRect(x, y, w, h);
                }
                if (isActive) {
                    const cr = shop.cashRegister;
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.5)';
                    ctx.fillRect(cr.x, cr.y, cr.w, cr.h);
                }
                ctx.fillStyle = colors.dayFactor > 0.5 ? '#333' : '#ccc';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(shop.name, x + w / 2, y + h / 2);
            }
            ctx.save();
            ctx.translate(shopPlayer.x, shopPlayer.y);
            ctx.rotate(shopPlayer.angle);
            ctx.beginPath();
            ctx.moveTo(shopPlayer.size, 0);
            ctx.lineTo(-shopPlayer.size, -shopPlayer.size / 1.5);
            ctx.lineTo(-shopPlayer.size, shopPlayer.size / 1.5);
            ctx.closePath();
            ctx.fillStyle = getCustomColor('playerColor', colors);
            ctx.fill();
            ctx.restore();
            ctx.restore();
        }

        // === DRAW SHIP INTERIOR - NOW WITH TRIANGLE PLAYER ===
        function drawShipInterior(colors) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Black background for ship interior
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            // Draw ship interior walls (black areas from image)
            ctx.fillStyle = '#111111';
            for (const wall of shipInteriorWalls) {
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
            }
            // === ОТРИСОВКА ЗОНЫ КАБИНЫ (зелёная зона для входа) ===
            ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
            ctx.fillRect(
                shipInteriorCockpitZone.x,
                shipInteriorCockpitZone.y,
                shipInteriorCockpitZone.w,
                shipInteriorCockpitZone.h
            );
            // Draw exit zone (green line)
            ctx.fillStyle = shipInteriorExitZone.color;
            ctx.fillRect(
                shipInteriorExitZone.x,
                shipInteriorExitZone.y,
                shipInteriorExitZone.w,
                shipInteriorExitZone.h
            );
            // === DRAW PLAYER AS TRIANGLE (like on map) ===
            ctx.save();
            ctx.translate(shipInteriorPlayer.x, shipInteriorPlayer.y);
            ctx.rotate(shipInteriorPlayer.angle);
            ctx.beginPath();
            ctx.moveTo(shipInteriorPlayer.size, 0);
            ctx.lineTo(-shipInteriorPlayer.size, -shipInteriorPlayer.size / 1.5);
            ctx.lineTo(-shipInteriorPlayer.size, shipInteriorPlayer.size / 1.5);
            ctx.closePath();
            ctx.fillStyle = getCustomColor('playerColor', colors);
            ctx.fill();
            ctx.restore();
            ctx.restore();
        }

        function drawTunnel(colors) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = document.body.style.backgroundColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.shadowBlur = 100;
            ctx.shadowColor = getCustomColor('tunnelColor', colors);
            ctx.strokeStyle = getCustomColor('tunnelColor', colors);
            ctx.lineWidth = 5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            tunnelPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
            ctx.beginPath();
            tunnelPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y + tunnelGap);
                else ctx.lineTo(p.x, p.y + tunnelGap);
            });
            ctx.stroke();
            if (tunnelTrail.length > 1) {
                ctx.shadowBlur = 30;
                ctx.strokeStyle = getCustomColor('trailColor', colors);
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(tunnelTrail[0].x, tunnelTrail[0].y);
                tunnelTrail.forEach(t => ctx.lineTo(t.x, t.y));
                ctx.stroke();
            }
            ctx.save();
            ctx.translate(playerX, tunnelPlayerY);
            const angle = tunnelIsClimbing ? -Math.PI / 4 : Math.PI / 4;
            ctx.rotate(angle);
            ctx.shadowBlur = 50;
            ctx.shadowColor = getCustomColor('playerColor', colors);
            ctx.fillStyle = getCustomColor('playerColor', colors);
            ctx.beginPath();
            ctx.moveTo(22, 0);
            ctx.lineTo(-12, -13);
            ctx.lineTo(-12, 13);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            ctx.restore();
        }

        // --- MAIN LOOP ---
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            const timeDelta = deltaTime * (currentState === MODE.SHOP ? 2 : 1);
            const colors = updateEnvironment(timeDelta);
            if (currentState === MODE.MAP) {
                updateMap(deltaTime);
                drawMap(colors);
            } else if (currentState === MODE.TUNNEL) {
                updateTunnel(deltaTime);
                drawTunnel(colors);
            } else if (currentState === MODE.SHOP) {
                updateShop(deltaTime);
                drawShop(colors);
            } else if (currentState === MODE.SHIP_INTERIOR) {
                updateShipInterior(deltaTime);
                drawShipInterior(colors);
            }
            if (currentState !== MODE.PAUSED) {
                requestAnimationFrame(loop);
            }
        }

        // Start
        requestAnimationFrame(loop);
    </script>
