<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Flight: Tunnel Run</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #4caf50;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: var(--font-family);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        /* --- UI ELEMENTS --- */
        #taskbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 50px;
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--ui-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            color: var(--text-color);
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #taskbar.hidden {
            transform: translateX(-50%) translateY(100px);
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .clock {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .score-display {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        #time-bar-container {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            z-index: 99;
            transition: opacity 0.5s;
        }

        #time-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--text-color);
            transition: width 1s linear;
        }

        #pause-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--ui-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--ui-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 110;
            color: var(--text-color);
            font-size: 20px;
            transition: background 0.2s;
        }

        #pause-btn:active {
            background: rgba(255,255,255,0.3);
        }

        #pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #pause-menu.active {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-box {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: white;
            min-width: 200px;
        }

        .menu-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

        #joystick-zone {
            position: absolute;
            bottom: 80px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 90;
            transition: opacity 0.3s;
        }
        
        #joystick-zone.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            pointer-events: auto;
        }

        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s;
        }

        #hint {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 50;
        }

        #tunnel-score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-color);
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px var(--text-color);
            z-index: 50;
            display: none;
        }

        #tunnel-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
            text-align: center;
        }
        
        #tunnel-timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-color);
            font-size: 4rem;
            font-weight: bold;
            z-index: 50;
            display: none;
            text-shadow: 0 0 20px var(--text-color);
        }

        /* === SHOP COLOR PICKER MENU === */
        #color-picker-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }

        #color-picker-menu.active {
            opacity: 1;
            pointer-events: auto;
        }

        #color-picker-menu h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }

        .color-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .color-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: white;
        }

        .color-btn.selected {
            border-color: #4caf50;
            box-shadow: 0 0 15px #4caf50;
        }

        .color-btn.default {
            background: linear-gradient(135deg, #ffffff 50%, #1a1a1a 50%);
        }

        .color-btn.red {
            background: #ff4444;
        }

        .color-btn.blue {
            background: #4444ff;
        }

        .close-picker-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-picker-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

        #shop-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body>
    <div id="hint">Fly to the Portal</div>
    <div id="shop-hint">Fly to exit the shop</div>
    <div id="tunnel-hint">Press & Hold to Fly Up • Release to Fall Down</div>
    <div id="tunnel-score">0</div>
    <div id="tunnel-timer">3</div>

    <div id="pause-btn">❚❚</div>

    <div id="time-bar-container">
        <div id="time-bar-fill"></div>
    </div>

    <div id="joystick-zone">
        <div class="joystick-base" id="joy-base">
            <div class="joystick-stick" id="joy-stick"></div>
        </div>
    </div>

    <div id="taskbar">
        <div class="clock-container">
            <div class="clock" id="clock">00:00</div>
            <div class="score-display" id="score-display">Best: 0</div>
        </div>
    </div>

    <div id="pause-menu">
        <div class="menu-box">
            <h2>PAUSED</h2>
            <button class="menu-btn" id="resume-btn">RESUME</button>
            <button class="menu-btn" id="exit-btn">EXIT TO MAP</button>
        </div>
    </div>

    <!-- === COLOR PICKER MENU === -->
    <div id="color-picker-menu">
        <h2 id="picker-title">Select Color</h2>
        <div class="color-options">
            <div class="color-btn default" data-color="default"></div>
            <div class="color-btn red" data-color="red"></div>
            <div class="color-btn blue" data-color="blue"></div>
        </div>
        <button class="close-picker-btn" id="close-picker-btn">CLOSE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- CONFIG & STATE ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const MODE = {
        MAP: 'MAP',
        TUNNEL: 'TUNNEL',
        SHOP: 'SHOP',
        PAUSED: 'PAUSED'
    };
    
    let currentState = MODE.MAP;
    let lastTime = 0;
    
    // Player (Map)
    const player = {
        x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15, speed: 0.5, friction: 0.96
    };

    // Portals
    const portal = { x: 500, y: -500, radius: 40, active: true, color: '#00f2ff' };
    const shopPortal = { x: -600, y: 0, radius: 40, active: true, color: '#ff4444' };

    // Joystick
    const joystick = {
        active: false, originX: 0, originY: 0, dx: 0, dy: 0, maxRadius: 35
    };

    // Time System
    const CYCLE_DURATION_SECONDS = 720;
    const HOURS_IN_DAY = 24;
    let gameTimeSeconds = 0;

    // Tunnel Game State
    let tunnelPoints = [];
    let tunnelGap = 100;
    let tunnelSpeed = 3.5;
    let tunnelMoveSpeed = 3.5;
    let tunnelScore = 0;
    let tunnelPlayerY = 0;
    let tunnelIsClimbing = false;
    let tunnelTrail = [];
    const tunnelTrailMaxLength = 200;
    const playerX = 100;
    
    let tunnelTimer = 0;
    const TUNNEL_START_DELAY = 1.0;

    // High Score
    let highScore = parseInt(localStorage.getItem('tunnelHighScore')) || 0;
    document.getElementById('score-display').innerText = `Best: ${highScore}`;

    // === SHOP STATE ===
    const shopConfig = {
        gridSize: 100,
        gridCount: 10,
        corridorWidth: 120,
        shopSize: 200
    };

    let shopPlayer = { x: 0, y: 0, vx: 0, vy: 0, angle: 0 };
    let shopCamera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
    let currentShop = null; // 'trail', 'player', 'tunnel', 'shape', or null
    let activeColorPicker = null; // Which color we're picking

    // === CUSTOMIZATION STATE ===
    let customization = {
        playerColor: localStorage.getItem('playerColor') || 'default',
        trailColor: localStorage.getItem('trailColor') || 'default',
        tunnelColor: localStorage.getItem('tunnelColor') || 'default',
        playerShape: localStorage.getItem('playerShape') || 'triangle'
    };

    // Shop definitions
    const shops = {
        trail: { 
            name: 'TRAIL', 
            x: -400, 
            y: -400, 
            colorKey: 'trailColor',
            cashRegister: { x: -480, y: -480, radius: 30 }
        },
        player: { 
            name: 'PLAYER', 
            x: 400, 
            y: -400, 
            colorKey: 'playerColor',
            cashRegister: { x: 480, y: -480, radius: 30 }
        },
        tunnel: { 
            name: 'TUNNEL', 
            x: -400, 
            y: 400, 
            colorKey: 'tunnelColor',
            cashRegister: { x: -480, y: 480, radius: 30 }
        },
        shape: { 
            name: 'SHAPE', 
            x: 400, 
            y: 400, 
            colorKey: 'playerShape',
            cashRegister: { x: 480, y: 480, radius: 30 }
        }
    };

    // Color values
    const colorValues = {
        default: { light: '#ffffff', dark: '#1a1a1a' },
        red: { light: '#ff4444', dark: '#cc0000' },
        blue: { light: '#4444ff', dark: '#0000cc' }
    };

    // --- RESIZE ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- UI ELEMENTS ---
    const joyBase = document.getElementById('joy-base');
    const joyStick = document.getElementById('joy-stick');
    const pauseBtn = document.getElementById('pause-btn');
    const resumeBtn = document.getElementById('resume-btn');
    const exitBtn = document.getElementById('exit-btn');
    const pauseMenu = document.getElementById('pause-menu');
    const taskbar = document.getElementById('taskbar');
    const joyZone = document.getElementById('joystick-zone');
    const hint = document.getElementById('hint');
    const shopHint = document.getElementById('shop-hint');
    const timeBarContainer = document.getElementById('time-bar-container');
    const tunnelScoreEl = document.getElementById('tunnel-score');
    const tunnelHint = document.getElementById('tunnel-hint');
    const tunnelTimerEl = document.getElementById('tunnel-timer');
    const colorPickerMenu = document.getElementById('color-picker-menu');
    const pickerTitle = document.getElementById('picker-title');
    const closePickerBtn = document.getElementById('close-picker-btn');
    const colorBtns = document.querySelectorAll('.color-btn');

    // --- JOYSTICK INPUT ---
    function handleStart(e) {
        if (currentState !== MODE.MAP && currentState !== MODE.SHOP) return;
        joystick.active = true;
        const rect = joyBase.getBoundingClientRect();
        joystick.originX = rect.left + rect.width / 2;
        joystick.originY = rect.top + rect.height / 2;
        handleMove(e);
    }

    function handleMove(e) {
        if (!joystick.active) return;
        e.preventDefault();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const deltaX = clientX - joystick.originX;
        const deltaY = clientY - joystick.originY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        const angle = Math.atan2(deltaY, deltaX);
        const clampedDist = Math.min(distance, joystick.maxRadius);
        
        joystick.dx = (clampedDist / joystick.maxRadius) * Math.cos(angle);
        joystick.dy = (clampedDist / joystick.maxRadius) * Math.sin(angle);

        const stickX = joystick.dx * joystick.maxRadius;
        const stickY = joystick.dy * joystick.maxRadius;
        joyStick.style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;
    }

    function handleEnd() {
        joystick.active = false;
        joystick.dx = 0;
        joystick.dy = 0;
        joyStick.style.transform = `translate(-50%, -50%)`;
    }

    joyBase.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    joyBase.addEventListener('touchstart', handleStart);
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);

    // --- TUNNEL INPUT ---
    function handleTunnelInputStart() {
        if (currentState !== MODE.TUNNEL || currentState === MODE.PAUSED) return;
        tunnelIsClimbing = true;
    }

    function handleTunnelInputEnd() {
        if (currentState !== MODE.TUNNEL) return;
        tunnelIsClimbing = false;
    }

    window.addEventListener('touchstart', (e) => {
        if (currentState === MODE.TUNNEL && currentState !== MODE.PAUSED) {
            e.preventDefault();
            handleTunnelInputStart();
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (currentState === MODE.TUNNEL) {
            e.preventDefault();
            handleTunnelInputEnd();
        }
    }, { passive: false });

    window.addEventListener('mousedown', (e) => {
        if (currentState === MODE.TUNNEL && currentState !== MODE.PAUSED && 
            e.target !== pauseBtn && e.target !== resumeBtn && e.target !== exitBtn) {
            handleTunnelInputStart();
        }
    });

    window.addEventListener('mouseup', () => {
        handleTunnelInputEnd();
    });

    window.addEventListener('keydown', (e) => {
        if (currentState === MODE.TUNNEL && currentState !== MODE.PAUSED) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                tunnelIsClimbing = true;
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (currentState === MODE.TUNNEL) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                tunnelIsClimbing = false;
            }
        }
    });

    // --- PAUSE CONTROLS ---
    pauseBtn.addEventListener('click', togglePause);
    resumeBtn.addEventListener('click', () => {
        togglePause();
    });
    exitBtn.addEventListener('click', () => {
        togglePause();
        if (currentState === MODE.TUNNEL || currentState === MODE.SHOP || currentState === MODE.PAUSED) {
            if (currentState === MODE.SHOP) {
                exitShop();
            } else if (currentState === MODE.TUNNEL) {
                exitTunnel();
            }
        }
    });

    function togglePause() {
        if (currentState === MODE.MAP) return;
        
        if (currentState === MODE.PAUSED) {
            if (currentShop) {
                currentState = MODE.SHOP;
            } else {
                currentState = MODE.TUNNEL;
            }
            pauseMenu.classList.remove('active');
            lastTime = performance.now();
            requestAnimationFrame(loop);
        } else {
            currentState = MODE.PAUSED;
            pauseMenu.classList.add('active');
        }
    }

    function exitTunnel() {
        currentState = MODE.MAP;
        tunnelScore = 0;
        tunnelPoints = [];
        tunnelTrail = [];
        tunnelScoreEl.style.display = 'none';
        tunnelHint.style.display = 'none';
        tunnelTimerEl.style.display = 'none';
        taskbar.classList.remove('hidden');
        joyZone.classList.remove('hidden');
        timeBarContainer.style.opacity = '1';
        hint.style.display = 'block';
        shopHint.style.display = 'none';
        pauseBtn.style.display = 'flex';
        
        player.x = portal.x + 100;
        player.y = portal.y + 100;
        player.vx = 0;
        player.vy = 0;
    }

    function exitShop() {
        currentState = MODE.MAP;
        currentShop = null;
        shopCamera.zoom = 1;
        shopCamera.targetZoom = 1;
        taskbar.classList.remove('hidden');
        joyZone.classList.remove('hidden');
        hint.style.display = 'block';
        shopHint.style.display = 'none';
        timeBarContainer.style.opacity = '1';
        pauseBtn.style.display = 'flex';
        
        // Return near shop portal
        player.x = shopPortal.x + 150;
        player.y = shopPortal.y;
        player.vx = 0;
        player.vy = 0;
    }

    // === SHOP FUNCTIONS ===
    function enterShop() {
        currentState = MODE.SHOP;
        shopPlayer.x = 0;
        shopPlayer.y = 0;
        shopPlayer.vx = 0;
        shopPlayer.vy = 0;
        shopPlayer.angle = 0;
        shopCamera.x = 0;
        shopCamera.y = 0;
        shopCamera.zoom = 1;
        shopCamera.targetZoom = 1;
        currentShop = null;
        
        tunnelScoreEl.style.display = 'none';
        tunnelHint.style.display = 'none';
        tunnelTimerEl.style.display = 'none';
        taskbar.classList.add('hidden');
        joyZone.classList.remove('hidden');
        hint.style.display = 'none';
        shopHint.style.display = 'block';
        timeBarContainer.style.opacity = '0';
        pauseBtn.style.display = 'flex';
    }

    function checkShopEntry() {
        // Check if player entered a shop zone
        for (const [key, shop] of Object.entries(shops)) {
            const dx = shopPlayer.x - shop.x;
            const dy = shopPlayer.y - shop.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < shopConfig.shopSize / 2) {
                if (currentShop !== key) {
                    currentShop = key;
                    shopCamera.targetZoom = 1.5;
                }
                return;
            }
        }
        
        // Check if player is in corridor
        if (Math.abs(shopPlayer.x) < shopConfig.corridorWidth / 2 || 
            Math.abs(shopPlayer.y) < shopConfig.corridorWidth / 2) {
            if (currentShop !== null) {
                currentShop = null;
                shopCamera.targetZoom = 1;
            }
        }
        
        // Check exit zone (end of corridor)
        if (shopPlayer.y < -shopConfig.gridSize * 4) {
            exitShop();
        }
    }

    function checkCashRegister() {
        if (!currentShop) return;
        
        const shop = shops[currentShop];
        const dx = shopPlayer.x - shop.cashRegister.x;
        const dy = shopPlayer.y - shop.cashRegister.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < shop.cashRegister.radius + player.size) {
            openColorPicker(currentShop);
        }
    }

    function updateShop(deltaTime) {
        // Player movement
        if (joystick.active) {
            shopPlayer.vx += joystick.dx * player.speed;
            shopPlayer.vy += joystick.dy * player.speed;
        }
        shopPlayer.vx *= player.friction;
        shopPlayer.vy *= player.friction;
        shopPlayer.x += shopPlayer.vx;
        shopPlayer.y += shopPlayer.vy;

        if (Math.abs(shopPlayer.vx) > 0.1 || Math.abs(shopPlayer.vy) > 0.1) {
            shopPlayer.angle = Math.atan2(shopPlayer.vy, shopPlayer.vx);
        }

        // Camera zoom interpolation
        shopCamera.zoom += (shopCamera.targetZoom - shopCamera.zoom) * 5 * deltaTime;

        // Check shop entry/exit
        checkShopEntry();
        
        // Check cash register
        if (currentShop && shops[currentShop].colorKey !== 'playerShape') {
            checkCashRegister();
        }
    }

    // === COLOR PICKER ===
    function openColorPicker(shopKey) {
        activeColorPicker = shopKey;
        const shop = shops[shopKey];
        pickerTitle.innerText = `Select ${shop.name} Color`;
        colorPickerMenu.classList.add('active');
        
        // Set current selection
        const currentColor = customization[shop.colorKey];
        colorBtns.forEach(btn => {
            btn.classList.remove('selected');
            if (btn.dataset.color === currentColor) {
                btn.classList.add('selected');
            }
        });
    }

    function closeColorPicker() {
        colorPickerMenu.classList.remove('active');
        activeColorPicker = null;
    }

    function selectColor(color) {
        if (activeColorPicker && shops[activeColorPicker]) {
            const shop = shops[activeColorPicker];
            customization[shop.colorKey] = color;
            localStorage.setItem(shop.colorKey, color);
            
            // Update selection visual
            colorBtns.forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.color === color) {
                    btn.classList.add('selected');
                }
            });
        }
    }

    colorBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            selectColor(btn.dataset.color);
        });
    });

    closePickerBtn.addEventListener('click', closeColorPicker);

    // --- TUNNEL FUNCTIONS ---
    function startTunnel() {
        currentState = MODE.TUNNEL;
        resetTunnel();
        
        tunnelScoreEl.style.display = 'block';
        tunnelHint.style.display = 'block';
        tunnelTimerEl.style.display = 'block';
        taskbar.classList.add('hidden');
        joyZone.classList.add('hidden');
        timeBarContainer.style.opacity = '0';
        hint.style.display = 'none';
        shopHint.style.display = 'none';
        pauseBtn.style.display = 'flex';
    }

    function resetTunnel() {
        tunnelScore = 0;
        tunnelPoints = [];
        tunnelTrail = [];
        tunnelPlayerY = canvas.height / 2;
        tunnelIsClimbing = false;
        tunnelTimer = TUNNEL_START_DELAY;
        
        tunnelGap = Math.max(150, Math.floor(canvas.height * 0.25));
        tunnelSpeed = 3.5;
        
        initTunnel();
        
        const startTunnel = getTunnelAt(playerX);
        tunnelPlayerY = startTunnel.y + tunnelGap / 2;
        
        tunnelScoreEl.innerText = '0';
    }

    function initTunnel() {
        tunnelPoints = [];
        let startY = (canvas.height - tunnelGap) / 2;
        startY = Math.max(30, Math.min(canvas.height - tunnelGap - 30, startY));
        
        for (let i = 0; i < 40; i++) {
            tunnelPoints.push({ x: i * 40, y: startY });
        }
        
        for (let i = 40; i < 80; i++) {
            addPoint();
        }
    }

    function addPoint() {
        const lastPoint = tunnelPoints[tunnelPoints.length - 1];
        const stepX = 40;
        const x = lastPoint.x + stepX;
        
        let dy = (Math.random() > 0.5) ? stepX : -stepX;
        let candidateY = lastPoint.y + dy;
        
        const minY = 30;
        const maxY = canvas.height - tunnelGap - 30;
        
        if (candidateY < minY || candidateY > maxY) {
            dy = -dy;
            candidateY = lastPoint.y + dy;
        }
        
        const newY = Math.max(minY, Math.min(maxY, candidateY));
        tunnelPoints.push({ x, y: newY });
    }

    function getTunnelAt(x) {
        for (let i = 0; i < tunnelPoints.length - 1; i++) {
            if (x >= tunnelPoints[i].x && x <= tunnelPoints[i + 1].x) {
                const t = (x - tunnelPoints[i].x) / (tunnelPoints[i + 1].x - tunnelPoints[i].x);
                return { 
                    y: tunnelPoints[i].y + t * (tunnelPoints[i + 1].y - tunnelPoints[i].y) 
                };
            }
        }
        return { y: canvas.height / 2 };
    }

    function updateTunnel(deltaTime) {
        const dt60 = deltaTime * 60;
        
        if (tunnelTimer > 0) {
            tunnelTimer -= deltaTime;
            if (tunnelTimer <= 0) {
                tunnelTimer = 0;
                tunnelTimerEl.style.display = 'none';
            } else {
                tunnelTimerEl.innerText = Math.ceil(tunnelTimer);
            }
        } else {
            if (tunnelIsClimbing) {
                tunnelPlayerY -= tunnelMoveSpeed;
            } else {
                tunnelPlayerY += tunnelMoveSpeed;
            }
        }
        
        tunnelScore += deltaTime * 15;
        tunnelScoreEl.innerText = Math.floor(tunnelScore);
        
        if (tunnelScore > highScore) {
            highScore = Math.floor(tunnelScore);
            localStorage.setItem('tunnelHighScore', highScore);
            document.getElementById('score-display').innerText = `Best: ${highScore}`;
        }
        
        for (let p of tunnelPoints) {
            p.x -= tunnelSpeed;
        }
        
        if (tunnelPoints.length > 0 && tunnelPoints[0].x < -100) {
            tunnelPoints.shift();
            addPoint();
        }
        
        tunnelTrail.push({ x: playerX, y: tunnelPlayerY });
        for (let t of tunnelTrail) {
            t.x -= tunnelSpeed;
        }
        if (tunnelTrail.length > tunnelTrailMaxLength) {
            tunnelTrail.shift();
        }
        
        const tunnel = getTunnelAt(playerX);
        if (tunnelPlayerY < tunnel.y || tunnelPlayerY > tunnel.y + tunnelGap) {
            onTunnelCrash();
            return;
        }
    }

    function onTunnelCrash() {
        canvas.style.filter = 'brightness(1.5)';
        setTimeout(() => {
            canvas.style.filter = '';
        }, 100);
        resetTunnel();
    }

    // --- MAP LOGIC ---
    function updateMap(deltaTime) {
        const timeScale = (HOURS_IN_DAY * 3600) / CYCLE_DURATION_SECONDS;
        gameTimeSeconds += deltaTime * timeScale;
        if (gameTimeSeconds >= HOURS_IN_DAY * 3600) {
            gameTimeSeconds -= HOURS_IN_DAY * 3600;
        }

        if (joystick.active) {
            player.vx += joystick.dx * player.speed;
            player.vy += joystick.dy * player.speed;
        }
        player.vx *= player.friction;
        player.vy *= player.friction;
        player.x += player.vx;
        player.y += player.vy;

        if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
            player.angle = Math.atan2(player.vy, player.vx);
        }

        // Check portal collision
        const dx = player.x - portal.x;
        const dy = player.y - portal.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < portal.radius + player.size) {
            startTunnel();
        }

        // Check shop portal collision
        const shopDx = player.x - shopPortal.x;
        const shopDy = player.y - shopPortal.y;
        const shopDist = Math.sqrt(shopDx * shopDx + shopDy * shopDy);
        if (shopDist < shopPortal.radius + player.size) {
            enterShop();
        }
    }

    // --- ENVIRONMENT & COLORS ---
    function updateEnvironment() {
        const totalSeconds = Math.floor(gameTimeSeconds);
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        
        document.getElementById('clock').innerText = 
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

        let dayFactor = 0;
        const sunrise = 6 * 3600;
        const sunset = 18 * 3600;
        const noon = 12 * 3600;

        if (totalSeconds >= sunrise && totalSeconds <= sunset) {
            const distFromNoon = Math.abs(totalSeconds - noon);
            dayFactor = 1 - (distFromNoon / 21600);
        } else {
            let distFromMidnight = (totalSeconds > sunset) ? 
                (24 * 3600 - totalSeconds) : totalSeconds;
            dayFactor = 1 - (distFromMidnight / 21600);
        }
        dayFactor = Math.max(0, Math.min(1, dayFactor));

        const rNight = 20, gNight = 20, bNight = 25;
        const rDay = 230, gDay = 235, bDay = 240;
        const r = Math.round(rNight + (rDay - rNight) * dayFactor);
        const g = Math.round(gNight + (gDay - gNight) * dayFactor);
        const b = Math.round(bNight + (bDay - bNight) * dayFactor);

        document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        
        const textColor = dayFactor > 0.5 ? '#1a1a1a' : '#ffffff';
        document.documentElement.style.setProperty('--text-color', textColor);
        
        const uiOpacity = dayFactor > 0.5 ? 0.15 : 0.5;
        document.documentElement.style.setProperty('--ui-bg', 
            `rgba(255, 255, 255, ${uiOpacity})`);

        const progress = (gameTimeSeconds / (24 * 3600)) * 100;
        document.getElementById('time-bar-fill').style.width = `${progress}%`;

        return { dayFactor, textColor };
    }

    // === GET COLOR FOR CUSTOMIZATION ===
    function getCustomColor(colorKey, colors) {
        const colorName = customization[colorKey];
        if (colorName === 'default') {
            return colors.textColor;
        }
        return colorValues[colorName] ? 
            (colors.dayFactor > 0.5 ? colorValues[colorName].dark : colorValues[colorName].light) 
            : colors.textColor;
    }

    // --- DRAWING ---
    function drawMap(colors) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gridSize = 100;
        const offsetX = -player.x % gridSize;
        const offsetY = -player.y % gridSize;
        ctx.beginPath();
        ctx.strokeStyle = colors.dayFactor > 0.5 ? 
            'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = offsetX; x < canvas.width; x += gridSize) {
            ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
        }
        for (let y = offsetY; y < canvas.height; y += gridSize) {
            ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
        }
        ctx.stroke();

        // Tunnel Portal (Cyan)
        ctx.save();
        ctx.translate(
            canvas.width / 2 + portal.x - player.x, 
            canvas.height / 2 + portal.y - player.y
        );
        ctx.beginPath();
        ctx.arc(0, 0, portal.radius, 0, Math.PI * 2);
        ctx.strokeStyle = portal.color;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = portal.color;
        ctx.stroke();
        ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
        ctx.fill();
        ctx.restore();

        // Shop Portal (Red)
        ctx.save();
        ctx.translate(
            canvas.width / 2 + shopPortal.x - player.x, 
            canvas.height / 2 + shopPortal.y - player.y
        );
        ctx.beginPath();
        ctx.arc(0, 0, shopPortal.radius, 0, Math.PI * 2);
        ctx.strokeStyle = shopPortal.color;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = shopPortal.color;
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 68, 68, 0.2)';
        ctx.fill();
        ctx.restore();

        // Player
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(player.angle);
        ctx.beginPath();
        ctx.moveTo(player.size, 0);
        ctx.lineTo(-player.size, -player.size / 1.5);
        ctx.lineTo(-player.size, player.size / 1.5);
        ctx.closePath();
        ctx.fillStyle = getCustomColor('playerColor', colors);
        ctx.fill();
        ctx.restore();

        // Compass
        drawCompass(colors);
    }

    function drawCompass(colors) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const compassRadius = 50;
        const markerWidth = 8;
        const markerArc = Math.PI / 6;

        // Calculate angle to tunnel portal
        const dx1 = portal.x - player.x;
        const dy1 = portal.y - player.y;
        const angleToPortal = Math.atan2(dy1, dx1);

        // Calculate angle to shop portal
        const dx2 = shopPortal.x - player.x;
        const dy2 = shopPortal.y - player.y;
        const angleToShop = Math.atan2(dy2, dx2);

        ctx.save();
        ctx.translate(centerX, centerY);
        
        // Circle background
        ctx.beginPath();
        ctx.arc(0, 0, compassRadius, 0, Math.PI * 2);
        ctx.strokeStyle = colors.dayFactor > 0.5 ? 
            'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Tunnel portal marker (Cyan)
        ctx.beginPath();
        ctx.arc(0, 0, compassRadius, angleToPortal - markerArc/2, angleToPortal + markerArc/2);
        ctx.strokeStyle = portal.color;
        ctx.lineWidth = markerWidth;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 10;
        ctx.shadowColor = portal.color;
        ctx.stroke();

        // Shop portal marker (Red)
        ctx.beginPath();
        ctx.arc(0, 0, compassRadius, angleToShop - markerArc/2, angleToShop + markerArc/2);
        ctx.strokeStyle = shopPortal.color;
        ctx.lineWidth = markerWidth;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 10;
        ctx.shadowColor = shopPortal.color;
        ctx.stroke();

        ctx.restore();
    }

    function drawShop(colors) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        
        // Apply camera transform
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(shopCamera.zoom, shopCamera.zoom);
        ctx.translate(-shopPlayer.x, -shopPlayer.y);

        const gs = shopConfig.gridSize;
        const gc = shopConfig.gridCount;
        const halfGrid = (gc * gs) / 2;

        // Background
        ctx.fillStyle = colors.dayFactor > 0.5 ? '#e0e0e0' : '#2a2a2a';
        ctx.fillRect(-halfGrid, -halfGrid, gc * gs, gc * gs);

        // Grid lines
        ctx.strokeStyle = colors.dayFactor > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        for (let x = -halfGrid; x <= halfGrid; x += gs) {
            ctx.beginPath();
            ctx.moveTo(x, -halfGrid);
            ctx.lineTo(x, halfGrid);
            ctx.stroke();
        }
        for (let y = -halfGrid; y <= halfGrid; y += gs) {
            ctx.beginPath();
            ctx.moveTo(-halfGrid, y);
            ctx.lineTo(halfGrid, y);
            ctx.stroke();
        }

        // Corridor walls
        ctx.strokeStyle = colors.dayFactor > 0.5 ? '#444' : '#aaa';
        ctx.lineWidth = 4;
        const cw = shopConfig.corridorWidth / 2;
        
        // Vertical corridor
        ctx.beginPath();
        ctx.moveTo(-cw, -halfGrid);
        ctx.lineTo(-cw, halfGrid);
        ctx.moveTo(cw, -halfGrid);
        ctx.lineTo(cw, halfGrid);
        ctx.stroke();

        // Horizontal corridor
        ctx.beginPath();
        ctx.moveTo(-halfGrid, -cw);
        ctx.lineTo(halfGrid, -cw);
        ctx.moveTo(-halfGrid, cw);
        ctx.lineTo(halfGrid, cw);
        ctx.stroke();

        // Shop entrances (openings in corridor walls)
        const shopEntranceSize = 80;
        ctx.strokeStyle = colors.dayFactor > 0.5 ? '#e0e0e0' : '#2a2a2a';
        ctx.lineWidth = 6;
        
        // Top-left shop entrance
        ctx.beginPath();
        ctx.moveTo(-cw, -cw - shopEntranceSize/2);
        ctx.lineTo(-cw, -cw + shopEntranceSize/2);
        ctx.moveTo(-cw - shopEntranceSize/2, -cw);
        ctx.lineTo(-cw + shopEntranceSize/2, -cw);
        ctx.stroke();

        // Top-right shop entrance
        ctx.beginPath();
        ctx.moveTo(cw, -cw - shopEntranceSize/2);
        ctx.lineTo(cw, -cw + shopEntranceSize/2);
        ctx.moveTo(cw - shopEntranceSize/2, -cw);
        ctx.lineTo(cw + shopEntranceSize/2, -cw);
        ctx.stroke();

        // Bottom-left shop entrance
        ctx.beginPath();
        ctx.moveTo(-cw, cw - shopEntranceSize/2);
        ctx.lineTo(-cw, cw + shopEntranceSize/2);
        ctx.moveTo(-cw - shopEntranceSize/2, cw);
        ctx.lineTo(-cw + shopEntranceSize/2, cw);
        ctx.stroke();

        // Bottom-right shop entrance
        ctx.beginPath();
        ctx.moveTo(cw, cw - shopEntranceSize/2);
        ctx.lineTo(cw, cw + shopEntranceSize/2);
        ctx.moveTo(cw - shopEntranceSize/2, cw);
        ctx.lineTo(cw + shopEntranceSize/2, cw);
        ctx.stroke();

        // Shop ceilings (in corridor view)
        if (shopCamera.zoom < 1.3) {
            ctx.fillStyle = colors.dayFactor > 0.5 ? 'rgba(100,100,100,0.7)' : 'rgba(50,50,50,0.7)';
            ctx.strokeStyle = colors.dayFactor > 0.5 ? '#666' : '#888';
            ctx.lineWidth = 2;

            // TRAIL shop ceiling
            ctx.fillRect(-halfGrid, -halfGrid, shopConfig.shopSize, shopConfig.shopSize);
            ctx.strokeRect(-halfGrid, -halfGrid, shopConfig.shopSize, shopConfig.shopSize);
            
            // PLAYER shop ceiling
            ctx.fillRect(halfGrid - shopConfig.shopSize, -halfGrid, shopConfig.shopSize, shopConfig.shopSize);
            ctx.strokeRect(halfGrid - shopConfig.shopSize, -halfGrid, shopConfig.shopSize, shopConfig.shopSize);
            
            // TUNNEL shop ceiling
            ctx.fillRect(-halfGrid, halfGrid - shopConfig.shopSize, shopConfig.shopSize, shopConfig.shopSize);
            ctx.strokeRect(-halfGrid, halfGrid - shopConfig.shopSize, shopConfig.shopSize, shopConfig.shopSize);
            
            // SHAPE shop ceiling
            ctx.fillRect(halfGrid - shopConfig.shopSize, halfGrid - shopConfig.shopSize, shopConfig.shopSize, shopConfig.shopSize);
            ctx.strokeRect(halfGrid - shopConfig.shopSize, halfGrid - shopConfig.shopSize, shopConfig.shopSize, shopConfig.shopSize);

            // Shop labels on ceilings
            ctx.fillStyle = colors.dayFactor > 0.5 ? '#fff' : '#aaa';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.fillText('TRAIL', -halfGrid + shopConfig.shopSize/2, -halfGrid + shopConfig.shopSize/2);
            ctx.fillText('PLAYER', halfGrid - shopConfig.shopSize/2, -halfGrid + shopConfig.shopSize/2);
            ctx.fillText('TUNNEL', -halfGrid + shopConfig.shopSize/2, halfGrid - shopConfig.shopSize/2);
            ctx.fillText('SHAPE', halfGrid - shopConfig.shopSize/2, halfGrid - shopConfig.shopSize/2);
        }

        // Shop interiors (when zoomed in)
        if (shopCamera.zoom >= 1.3 && currentShop) {
            const shop = shops[currentShop];
            
            // Shop floor
            ctx.fillStyle = colors.dayFactor > 0.5 ? 'rgba(200,200,255,0.3)' : 'rgba(100,100,150,0.3)';
            ctx.fillRect(shop.x - shopConfig.shopSize/2, shop.y - shopConfig.shopSize/2, 
                        shopConfig.shopSize, shopConfig.shopSize);
            ctx.strokeStyle = colors.dayFactor > 0.5 ? '#88f' : '#66a';
            ctx.lineWidth = 2;
            ctx.strokeRect(shop.x - shopConfig.shopSize/2, shop.y - shopConfig.shopSize/2, 
                          shopConfig.shopSize, shopConfig.shopSize);

            // Cash register
            ctx.fillStyle = '#4caf50';
            ctx.beginPath();
            ctx.arc(shop.cashRegister.x, shop.cashRegister.y, shop.cashRegister.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Cash register symbol
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', shop.cashRegister.x, shop.cashRegister.y);
        }

        // Exit zone indicator
        ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
        ctx.fillRect(-cw, -halfGrid, cw * 2, -gs * 2);
        ctx.strokeStyle = '#4caf50';
        ctx.lineWidth = 2;
        ctx.strokeRect(-cw, -halfGrid, cw * 2, -gs * 2);
        
        ctx.fillStyle = colors.dayFactor > 0.5 ? '#2e7d32' : '#81c784';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('EXIT', 0, -halfGrid + 30);

        // Player
        ctx.save();
        ctx.translate(shopPlayer.x, shopPlayer.y);
        ctx.rotate(shopPlayer.angle);
        ctx.beginPath();
        ctx.moveTo(player.size, 0);
        ctx.lineTo(-player.size, -player.size / 1.5);
        ctx.lineTo(-player.size, player.size / 1.5);
        ctx.closePath();
        ctx.fillStyle = getCustomColor('playerColor', colors);
        ctx.fill();
        ctx.restore();

        ctx.restore();
    }

    function drawTunnel(colors) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = document.body.style.backgroundColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        
        ctx.shadowBlur = 100;
        ctx.shadowColor = getCustomColor('tunnelColor', colors);
        ctx.strokeStyle = getCustomColor('tunnelColor', colors);
        ctx.lineWidth = 5;
        ctx.lineJoin = 'round';
        
        // Top wall
        ctx.beginPath();
        tunnelPoints.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
        
        // Bottom wall
        ctx.beginPath();
        tunnelPoints.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y + tunnelGap);
            else ctx.lineTo(p.x, p.y + tunnelGap);
        });
        ctx.stroke();
        
        // Trail
        if (tunnelTrail.length > 1) {
            ctx.shadowBlur = 30;
            ctx.strokeStyle = getCustomColor('trailColor', colors);
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(tunnelTrail[0].x, tunnelTrail[0].y);
            tunnelTrail.forEach(t => ctx.lineTo(t.x, t.y));
            ctx.stroke();
        }
        
        // Player
        ctx.save();
        ctx.translate(playerX, tunnelPlayerY);
        
        const angle = tunnelIsClimbing ? -Math.PI / 4 : Math.PI / 4;
        ctx.rotate(angle);
        
        ctx.shadowBlur = 50;
        ctx.shadowColor = getCustomColor('playerColor', colors);
        ctx.fillStyle = getCustomColor('playerColor', colors);
        
        ctx.beginPath();
        ctx.moveTo(22, 0);
        ctx.lineTo(-12, -13);
        ctx.lineTo(-12, 13);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
        ctx.restore();
    }

    // --- MAIN LOOP ---
    function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
        lastTime = timestamp;

        const colors = updateEnvironment();

        if (currentState === MODE.MAP) {
            updateMap(deltaTime);
            drawMap(colors);
        } else if (currentState === MODE.TUNNEL) {
            updateTunnel(deltaTime);
            drawTunnel(colors);
        } else if (currentState === MODE.SHOP) {
            updateShop(deltaTime);
            drawShop(colors);
        }

        if (currentState !== MODE.PAUSED) {
            requestAnimationFrame(loop);
        }
    }

    // Start
    requestAnimationFrame(loop);
</script>
