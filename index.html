<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonWaveINSPACEE</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #4caf50;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: var(--font-family);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #top-right-info {
            position: fixed;
            top: 20px;
            right: 80px;
            z-index: 200;
            color: white;
            text-align: right;
            font-family: var(--font-family);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
        }
        #clock {
            font-size: 2rem;
            font-weight: 300;
            line-height: 1.2;
        }
        #score-display {
            font-size: 1rem;
            opacity: 0.8;
        }
        #pause-btn {
            position: fixed;
            top: 25px;
            right: 20px;
            width: 40px;
            height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgb(180, 255, 255);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 210;
            color: #fff;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 5px #fff;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #pause-btn:active { background: rgba(255,255,255,0.2); }
        #pause-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            backdrop-filter: blur(7px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #pause-menu.active { opacity: 1; pointer-events: auto; }
        .menu-box {
            background: transparent;
            border: none;
            padding: 0;
            border-radius: 0;
            text-align: center;
            color: white;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .menu-box h2 {
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
            color: #fff;
        }
        .menu-btn {
            background: rgba(0,0,0,0.1);
            border: 2px solid rgb(200, 255, 255);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0);
            text-shadow: 0 0 5px #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; box-shadow: 0 0 25px rgba(0, 255, 255, 0); }
        #joystick-zone {
            position: absolute;
            bottom: 80px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 90;
            transition: opacity 0.3s;
        }
        #joystick-zone.hidden { opacity: 0; pointer-events: none; }
        .joystick-base {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .joystick-stick {
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s;
        }
        .drive-zone {
            position: fixed;
            bottom: 0;
            width: 30%;
            height: 50%;
            background: rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 95;
            pointer-events: auto;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .drive-zone.left { left: 0; }
        .drive-zone.right { right: 0; }
        .drive-zone.pressed { background: rgba(255, 255, 255, 0.4); }
        .drive-zone.hidden { opacity: 0; pointer-events: none; }
        #hint {
            position: absolute;
            top: 20px; left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 50;
        }
        #shop-hint {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        #tunnel-score {
            position: absolute;
            top: 20px; left: 10%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px #ffffff;
            z-index: 50;
            display: none;
        }
        #tunnel-timer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 4rem;
            font-weight: bold;
            z-index: 50;
            display: none;
            text-shadow: 0 0 20px #ffffff;
        }
        #color-picker-menu {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 5px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }
        #color-picker-menu.active { opacity: 1; pointer-events: auto; }
        #color-picker-menu h2 { margin: 0 0 20px 0; font-size: 1.5rem; }
        .color-options {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .color-btn, .gradient-btn {
            width: 50px; height: 50px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .color-btn:hover, .gradient-btn:hover { transform: scale(1.15); border-color: white; }
        .color-btn.selected, .gradient-btn.selected { border-color: #4caf50; box-shadow: 0 0 15px #4caf50; }
        .color-btn.default { background: #ffffff; }
        .color-btn.red { background: #ff4444; }
        .color-btn.blue { background: #4444ff; }
        .color-btn.yellow { background: #ffcc00; }
        .color-btn.green { background: #4caf50; }
        .color-btn.cyan { background: #00bcd4; }
        .gradient-btn.yellow-blue { background: linear-gradient(135deg, #ffff00, #00ffff); }
        .gradient-btn.red-blue { background: linear-gradient(135deg, #ff4444, #aa44ff, #4444ff); }
        .gradient-btn.black { background: #000000; }
        #assembler-menu {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 5px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }
        #assembler-menu.active { opacity: 1; pointer-events: auto; }
        #assembler-menu h2 { margin: 0 0 20px 0; font-size: 1.5rem; color: #ff00009a; }
        .build-progress {
            width: 100%; height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .build-progress-bar { height: 100%; width: 0%; background: #ffffff; transition: width 0.1s linear; }
        #interact-btn {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            border: 2px solid #ff0;
            padding: 10px 20px;
            border-radius: 5px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 0 20px #ff0;
            text-shadow: 0 0 5px #fff;
        }
        #interact-btn.visible { opacity: 1; pointer-events: auto; }
        #interact-btn:active { transform: translateX(-50%) scale(0.95); }
        #ship-control-panel {
            position: fixed;
            top: 50px; left: 20px;
            width: 30%; height: 30%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            padding: 15px 20px;
            border-radius: 0;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #ship-control-panel.visible { opacity: 1; pointer-events: auto; }
        .panel-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 70%;
        }
        #radarCanvas {
            flex: 0 1 auto;
            width: auto;
            max-width: 100%;
            aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(150, 255, 255, 0.5);
            height: 100%;
        }
        .nav-button {
            flex: 1;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgb(170, 255, 255);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .nav-button:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.95); }
        #thrust-panel {
            width: 100%; height: 20%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #thrust-panel-fill {
            height: 100%; width: 0%;
            background: #ffffff;
            box-shadow: 0 0 15px #00ffff;
            transition: width 0.05s linear;
        }
        #ship-interior-hint {
            position: fixed;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
            text-align: center;
        }
        #nav-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            backdrop-filter: blur(7px);
            z-index: 260;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #nav-menu.active { opacity: 1; pointer-events: auto; }
        #nav-menu .menu-box { min-width: 280px; }
        #nav-menu h2, #nav-menu h3 { margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 10px rgba(170, 255, 255, 0.3); }
        #nav-menu h3 { font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .planets-list {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px 0;
            margin-bottom: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .planet-item {
            padding: 8px 15px;
            color: rgba(255,255,255,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .planet-item:hover { background: rgba(255,255,255,0.2); }
        .planet-item.selected { background: rgba(76, 175, 80, 0.3); border-left: 3px solid #00FF00; }
        .planet-item:last-child { border-bottom: none; }
        #nav-lift-land {
            border-color: rgb(180, 255, 255);
            color: rgb(180, 255, 255);
            margin-top: 10px;
        }
        #nav-lift-land.disabled { opacity: 0.3; pointer-events: none; border-color: gray; color: gray; }
        @media (orientation: portrait) {
            #ship-control-panel .panel-row { flex-direction: column; height: auto; gap: 10px; }
            #radarCanvas { width: auto; max-width: 100%; height: 100%; aspect-ratio: 1 / 1; }
            .nav-button { width: 100%; height: 100%; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="top-right-info">
        <div id="clock">00:00</div>
        <div id="score-display">Best: 0</div>
    </div>
    <div id="hint">Fly to the Portal</div>
    <div id="shop-hint">Fly to corridor end to Exit</div>
    <div id="ship-interior-hint">Walk to green zone to exit ship</div>
    <div id="tunnel-score">0</div>
    <div id="tunnel-timer">3</div>
    <div id="pause-btn">❚❚</div>

    <div id="joystick-zone">
        <div class="joystick-base" id="joy-base">
            <div class="joystick-stick" id="joy-stick"></div>
        </div>
    </div>
    <div id="drive-left-zone" class="drive-zone left hidden"></div>
    <div id="drive-right-zone" class="drive-zone right hidden"></div>

    <div id="ship-control-panel">
        <div class="panel-row">
            <canvas id="radarCanvas" width="400" height="400"></canvas>
            <div id="nav-btn" class="nav-button">N.S.</div>
        </div>
        <div id="thrust-panel">
            <div id="thrust-panel-fill"></div>
        </div>
    </div>

    <div id="nav-menu">
        <div class="menu-box">
            <h2 id="nav-position">Planet</h2>
            <div class="planets-list">
                <h3>Planets:</h3>
                <div class="planet-item" id="planet-home">Home</div>
            </div>
            <button class="menu-btn" id="nav-lift-land">LIFT</button>
        </div>
    </div>

    <div id="pause-menu">
        <div class="menu-box">
            <h2>PAUSE</h2>
            <button class="menu-btn" id="resume-btn">RESUME</button>
            <button class="menu-btn" id="exit-btn">EXIT</button>
        </div>
    </div>

    <div id="color-picker-menu">
        <h2 id="picker-title">Select Color</h2>
        <div class="color-options" id="color-options">
            <div class="color-btn default" data-color="default"></div>
            <div class="color-btn red" data-color="red"></div>
            <div class="color-btn blue" data-color="blue"></div>
            <div class="color-btn yellow" data-color="yellow"></div>
            <div class="color-btn green" data-color="green"></div>
            <div class="color-btn cyan" data-color="cyan"></div>
        </div>
        <div class="color-options" id="gradient-options" style="display: none;">
            <div class="gradient-btn yellow-blue" data-gradient="yellow-blue"></div>
            <div class="gradient-btn red-blue" data-gradient="red-blue"></div>
            <div class="gradient-btn black" data-gradient="black"></div>
        </div>
    </div>

    <div id="assembler-menu">
        <h2>ASSEMBLY V.164</h2>
        <p id="assembler-status">Ready to Build</p>
        <button class="menu-btn" id="build-btn" style="border-color: #4caf50; color: #4caf50;">BUILD SHIP</button>
        <div class="build-progress" id="build-progress-container">
            <div class="build-progress-bar" id="build-progress-bar"></div>
        </div>
    </div>

    <div id="interact-btn">ENTER</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        (function(){
            "use strict";

            // === CONFIG & STATE ===
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
            const MODE = {
                MAP: 'MAP',
                TUNNEL: 'TUNNEL',
                SHOP: 'SHOP',
                PAUSED: 'PAUSED',
                SHIP_INTERIOR: 'SHIP_INTERIOR',
                SPACE: 'SPACE'
            };
            let currentState = MODE.MAP;
            let shipPreviousMode = MODE.MAP;
            let lastTime = 0;

            // Player (Map)
            const player = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15, speed: 0.25, friction: 0.96 };

            // === PLAYER TRAIL (MAP)
            const mapTrail = [];
            const mapTrailMaxLength = 50;
            const TRAIL_FADE_SPEED = 0.1;
            let trailAddTimer = 0;
            let trailAccumulator = 0;
            const TRAIL_RECORD_INTERVAL = 0.1;
            const TRAIL_ADD_INTERVAL = 1;

            // Portals
            const portal = { x: -2500, y: -500, radius: 40, active: true, color: '#00f2ff' };
            const shopPortal = { x: -2500, y: -400, radius: 40, active: true, color: '#ff4444' };

            // Joystick
            const joystick = {
                active: false, originX: 0, originY: 0, dx: 0, dy: 0, maxRadius: 35
            };

            // Tunnel
            let tunnelPoints = [];
            let tunnelGap = 100;
            let tunnelSpeed = 3.5;
            let tunnelMoveSpeed = 3.5;
            let tunnelScore = 0;
            let tunnelPlayerY = 0;
            let tunnelDirection = -1;
            let tunnelTrail = [];
            const tunnelTrailMaxLength = 200;
            const playerX = 100;
            let tunnelTimer = 0;
            const TUNNEL_START_DELAY = 1.0;

            let highScore = parseInt(localStorage.getItem('tunnelHighScore')) || 0;
            document.getElementById('score-display').innerText = `Best: ${highScore}`;

            // Shop
            const shopConfig = { gridSize: 100, gridCount: 10, corridorWidth: 200, shopSize: 400, wallThickness: 10 };
            let shopPlayer = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15 };
            let shopCamera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
            let currentShop = null;
            let activeColorPicker = null;

            const shopWalls = [
                { x: -500, y: -500, w: 350, h: 10 }, { x: 150, y: -500, w: 350, h: 10 },
                { x: -500, y: 490, w: 350, h: 10 }, { x: 150, y: 490, w: 350, h: 10 },
                { x: -500, y: -500, w: 10, h: 350 }, { x: -500, y: 150, w: 10, h: 350 },
                { x: 490, y: -500, w: 10, h: 350 }, { x: 490, y: 150, w: 10, h: 350 }
            ];

            const shopZones = {
                trail: { name: 'TRAIL', x: -500, y: -500, w: 400, h: 400, colorKey: 'trailColor', cashRegister: { x: -400, y: -400, w: 200, h: 200 } },
                player: { name: 'PLAYER', x: 100, y: -500, w: 400, h: 400, colorKey: 'playerColor', cashRegister: { x: 200, y: -400, w: 200, h: 200 } },
                tunnel: { name: 'TUNNEL', x: -500, y: 100, w: 400, h: 400, colorKey: 'tunnelColor', cashRegister: { x: -400, y: 200, w: 200, h: 200 } },
                map: { name: 'MAP', x: 100, y: 100, w: 400, h: 400, colorKey: 'mapGradient', cashRegister: { x: 200, y: 200, w: 200, h: 200 } }
            };
            const exitZones = [
                { x: -75, y: -500, w: 150, h: 20 }, { x: -75, y: 480, w: 150, h: 20 },
                { x: -500, y: -75, w: 20, h: 150 }, { x: 480, y: -75, w: 20, h: 150 }
            ];

            let customization = {
                playerColor: localStorage.getItem('playerColor') || 'default',
                trailColor: localStorage.getItem('trailColor') || 'default',
                tunnelColor: localStorage.getItem('tunnelColor') || 'default',
                mapGradient: localStorage.getItem('mapGradient') || 'yellow-blue'
            };

            const colorValues = {
                default: '#ffffff', red: '#ff4444', blue: '#4444ff', yellow: '#ffcc00', green: '#4caf50', cyan: '#00bcd4'
            };

            // Hangar & Spaceship
            const BLOCK_SIZE = 50;
            const hangar = { x: -2600, y: -1200, w: 15 * BLOCK_SIZE, h: 25 * BLOCK_SIZE, color: '#cccccc' };
            const hangarWalls = [
                { x: hangar.x, y: hangar.y, w: 10, h: hangar.h },
                { x: hangar.x + hangar.w - 10, y: hangar.y, w: 10, h: hangar.h },
                { x: hangar.x, y: hangar.y, w: hangar.w, h: 10 }
            ];

            const assembler = { x: hangar.x + hangar.w / 2 - 125, y: hangar.y + 100, w: 5 * BLOCK_SIZE, h: 5 * BLOCK_SIZE };
            const assemblerWalls = [
                { x: assembler.x, y: assembler.y, w: 10, h: assembler.h },
                { x: assembler.x + assembler.w - 10, y: assembler.y, w: 10, h: assembler.h },
                { x: assembler.x, y: assembler.y, w: assembler.w, h: 10 },
                { x: assembler.x, y: assembler.y + 250, w: assembler.w, h: 10 }
            ];
            const terminalZone = { x: assembler.x, y: assembler.y + assembler.h + 10, w: assembler.w, h: 40 };

            const shipConfig = { w: 5 * BLOCK_SIZE, h: 5 * BLOCK_SIZE, size: 120 };
            let spaceship = { x: assembler.x + shipConfig.w / 2, y: assembler.y + shipConfig.h / 2, vx: 0, vy: 0, angle: 0,
                angularVelocity: 0, built: false, building: false, buildProgress: 0, alpha: 0 };

            let inShip = false;
            let inShipInterior = false;
            let inCockpitZone = false;
            let shipInteriorPlayer = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15 };

            const shipInteriorWalls = [
                { x: -40, y: -250, w: 80, h: 10 }, { x: -40, y: -240, w: 10, h: 200 }, { x: 30, y: -240, w: 10, h: 200 },
                { x: -80, y: -50, w: 40, h: 10 }, { x: 40, y: -50, w: 40, h: 10 }, { x: -80, y: -40, w: 10, h: 120 },
                { x: 70, y: -40, w: 10, h: 120 }, { x: -80, y: 30, w: 40, h: 10 }, { x: 40, y: 30, w: 40, h: 10 },

                if (!joystick.active) return; e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = clientX - joystick.originX, dy = clientY - joystick.originY;
                const dist = Math.sqrt(dx*dx+dy*dy);
                const angle = Math.atan2(dy, dx);
                const clamped = Math.min(dist, joystick.maxRadius);

                joystick.dy = (clamped/joystick.maxRadius) * Math.sin(angle);
                const stickX = joystick.dx * joystick.maxRadius, stickY = joystick.dy * joystick.maxRadius;
                joyStick.style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;

            // Collision helpers
            function checkWallCollision(x, y, r) {
                for (const w of shopWalls) {
                    const cx = Math.max(w.x, Math.min(x, w.x+w.w)), cy = Math.max(w.y, Math.min(y, w.y+w.h));
                    if (Math.hypot(x-cx, y-cy) < r) return true;
                } return false;
            }
            function checkShipInteriorCollision(x,y,r) {
                for (const w of shipInteriorWalls) {
                    const cx = Math.max(w.x, Math.min(x, w.x+w.w)), cy = Math.max(w.y, Math.min(y, w.y+w.h));
                    if (Math.hypot(x-cx, y-cy) < r) return true;
                } return false;
            }
            function checkHangarCollision(x,y,r) {
                for (const w of hangarWalls) {
                    const cx = Math.max(w.x, Math.min(x, w.x+w.w)), cy = Math.max(w.y, Math.min(y, w.y+w.h));
                    if (Math.hypot(x-cx, y-cy) < r) return true;
                }
                if (!inShip && !inShipInterior) {
                    for (const w of assemblerWalls) {
                        const cx = Math.max(w.x, Math.min(x, w.x+w.w)), cy = Math.max(w.y, Math.min(y, w.y+w.h));
                        if (Math.hypot(x-cx, y-cy) < r) return true;
                    }
                } return false;
            }

            function checkShopEntry() {
                for (const [k, s] of Object.entries(shopZones)) {
                    if (shopPlayer.x>s.x && shopPlayer.x<s.x+s.w && shopPlayer.y>s.y && shopPlayer.y<s.y+s.h) {
                        if(currentShop!==k) { currentShop=k; shopCamera.targetZoom=1.5; } return;
                    }
                }
                if(currentShop) { currentShop=null; shopCamera.targetZoom=1; }
                for(const z of exitZones) if(shopPlayer.x>z.x && shopPlayer.x<z.x+z.w && shopPlayer.y>z.y && shopPlayer.y<z.y+z.h) exitShop();
            }
            function checkCashRegister() {
                if(!currentShop) return; const s=shopZones[currentShop]; const cr=s.cashRegister;
                if(shopPlayer.x>cr.x && shopPlayer.x<cr.x+cr.w && shopPlayer.y>cr.y && shopPlayer.y<cr.y+cr.h) openColorPicker(currentShop);

            function updateShop(dt) {

                if(Math.abs(shopPlayer.vx)>0.1||Math.abs(shopPlayer.vy)>0.1) shopPlayer.angle=Math.atan2(shopPlayer.vy,shopPlayer.vx);

            // Tunnel
            function startTunnel() { currentState=MODE.TUNNEL; resetTunnel(); tunnelScoreEl.style.display='block'; tunnelTimerEl.style.display='block'; joyZone.classList.add('hidden'); hint.style.display='none'; shopHint.style.display='none'; updatePauseButtonVisibility(); updateDriveZonesVisibility(); }
            function resetTunnel() {
                tunnelScore=0; tunnelPoints=[]; tunnelTrail=[]; tunnelPlayerY=canvas.height/2; tunnelDirection=-1; tunnelTimer=TUNNEL_START_DELAY;
                tunnelGap=Math.max(150, Math.floor(canvas.height*0.25)); tunnelSpeed=3.5; initTunnel(); const t=getTunnelAt(playerX); tunnelPlayerY=t.y+tunnelGap/2; tunnelScoreEl.innerText='0';
            }
            function initTunnel() {
                tunnelPoints=[]; let startY=(canvas.height-tunnelGap)/2; startY=Math.max(30,Math.min(canvas.height-tunnelGap-30,startY));
                for(let i=0;i<40;i++) tunnelPoints.push({x:i*40, y:startY});
                for(let i=40;i<80;i++) addPoint();
            }
            function addPoint() {
                const last=tunnelPoints[tunnelPoints.length-1]; const stepX=40; let dy=(Math.random()>0.5)?stepX:-stepX;
                let cand=last.y+dy; const minY=30, maxY=canvas.height-tunnelGap-30;
                if(cand<minY||cand>maxY) dy=-dy; cand=last.y+dy;
                tunnelPoints.push({x:last.x+stepX, y:Math.max(minY,Math.min(maxY,cand))});
            }
            function getTunnelAt(x) {
                for(let i=0;i<tunnelPoints.length-1;i++) if(x>=tunnelPoints[i].x && x<=tunnelPoints[i+1].x) {
                    const t=(x-tunnelPoints[i].x)/(tunnelPoints[i+1].x-tunnelPoints[i].x);
                    return {y: tunnelPoints[i].y + t*(tunnelPoints[i+1].y-tunnelPoints[i].y)};
                } return {y:canvas.height/2};
            }
            function updateTunnel(dt) {
                if(tunnelTimer>0) { tunnelTimer-=dt; if(tunnelTimer<=0) { tunnelTimer=0; tunnelTimerEl.style.display='none'; } else tunnelTimerEl.innerText=Math.ceil(tunnelTimer); }
                else { tunnelPlayerY -= tunnelDirection * tunnelMoveSpeed; }
                tunnelScore+=dt*15; tunnelScoreEl.innerText=Math.floor(tunnelScore);
                if(tunnelScore>highScore) { highScore=Math.floor(tunnelScore); localStorage.setItem('tunnelHighScore',highScore); scoreDisplayEl.innerText=`Best: ${highScore}`; }
                for(let p of tunnelPoints) p.x-=tunnelSpeed;
                if(tunnelPoints.length && tunnelPoints[0].x<-100) { tunnelPoints.shift(); addPoint(); }
                tunnelTrail.push({x:playerX, y:tunnelPlayerY});
                for(let t of tunnelTrail) t.x-=tunnelSpeed;
                if(tunnelTrail.length>tunnelTrailMaxLength) tunnelTrail.shift();
                const tun=getTunnelAt(playerX); if(tunnelPlayerY<tun.y || tunnelPlayerY>tun.y+tunnelGap) onTunnelCrash();
            }
            function onTunnelCrash() { canvas.style.filter='brightness(1.5)'; setTimeout(()=>canvas.style.filter='',100); resetTunnel(); }

            // Цвета
            function getCustomColor(key) { const n=customization[key]; return (n==='default'||!colorValues[n])?'#ffffff':colorValues[n]; }
            function applyBackground() {

                    else if(g==='red-blue') { grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height); grad.addColorStop(0,'#f44'); grad.addColorStop(0.5,'#a4f'); grad.addColorStop(1,'#44f'); }
                    ctx.fillStyle=grad; ctx.globalAlpha=0.3; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.globalAlpha=1;
                }
            }

            function updateRealTimeClock() { const d=new Date(); clockEl.innerText=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
            setInterval(updateRealTimeClock,1000); updateRealTimeClock();

            // === MAP UPDATE (оптимизировано) ===
            function updateMap(dt) {
                if(spaceship.building) {
                    spaceship.buildProgress+=dt*20;
                    if(spaceship.buildProgress>=100) { spaceship.buildProgress=100; spaceship.building=false; spaceship.built=true; spaceship.alpha=1;
                        assemblerStatus.innerText="Ship Ready!"; buildProgressContainer.style.display='none'; }
                    else { buildProgressBar.style.width=`${spaceship.buildProgress}%`; spaceship.alpha=spaceship.buildProgress/100; }
                }
                if(inShip && !navMenuOpen) {
                    const turnAccel=30, maxTurn=60, friction=0.98;
                    if(leftPressed && !rightPressed) spaceship.angularVelocity -= turnAccel*dt;
                    else if(rightPressed && !leftPressed) spaceship.angularVelocity += turnAccel*dt;
                    spaceship.angularVelocity = Math.max(-maxTurn, Math.min(maxTurn, spaceship.angularVelocity)) * friction;
                    spaceship.angle += spaceship.angularVelocity * dt;
                    if(thrustIncreasing) thrustPower = Math.min(maxThrustPower, thrustPower+thrustRiseRate*dt);
                    else if(thrustDecreasing) thrustPower = Math.max(0, thrustPower-thrustFallRate*dt);
                    const thrust=0.30; spaceship.vx += Math.cos(spaceship.angle)*thrust*thrustPower;
                    spaceship.vy += Math.sin(spaceship.angle)*thrust*thrustPower;
                    spaceship.vx*=0.985; spaceship.vy*=0.985; spaceship.x+=spaceship.vx; spaceship.y+=spaceship.vy;
                    player.x=spaceship.x; player.y=spaceship.y; player.angle=spaceship.angle;
                    thrustPanelFill.style.width=`${thrustPower*100}%`;
                } else if(!inShipInterior && !navMenuOpen && currentState===MODE.MAP) {
                    if(joystick.active) { player.vx+=joystick.dx*player.speed; player.vy+=joystick.dy*player.speed; }
                    player.vx*=player.friction; player.vy*=player.friction;
                    const nx=player.x+player.vx, ny=player.y+player.vy;
                    if(!checkHangarCollision(nx, player.y, player.size)) player.x=nx;
                    if(!checkHangarCollision(player.x, ny, player.size)) player.y=ny;
                    if(Math.abs(player.vx)>0.1||Math.abs(player.vy)>0.1) player.angle=Math.atan2(player.vy,player.vx);
                }

                // === ОПТИМИЗИРОВАННЫЙ ТРЕЙЛ: запись не каждый кадр ===
                if(currentState===MODE.MAP && !inShip && !inShipInterior) {
                    const speed = Math.hypot(player.vx, player.vy);
                    trailAccumulator++;
                    if(speed>0.1 && trailAccumulator>=TRAIL_RECORD_INTERVAL) {
                        mapTrail.push({x:player.x, y:player.y});
                        if(mapTrail.length>mapTrailMaxLength) mapTrail.shift();
                        trailAccumulator=0;
                    }
                }

                if(currentState===MODE.MAP && !inShip && !inShipInterior) {
                    const d1=Math.hypot(player.x-portal.x, player.y-portal.y); if(d1<portal.radius+player.size) startTunnel();
                    const d2=Math.hypot(player.x-shopPortal.x, player.y-shopPortal.y); if(d2<shopPortal.radius+player.size) enterShop();
                }

                // Затухание существующих точек
                for (let i = mapTrail.length - 1; i >= 0; i--) {
                    mapTrail[i].life -= dt * TRAIL_FADE_SPEED;
                    if (mapTrail[i].life <= 0) {
                        mapTrail.splice(i, 1);
                    }
                }

                // Добавление новой точки (с таймером)
                trailAddTimer += dt;
                const speed = Math.hypot(player.vx, player.vy);
                const shouldAdd = (speed > 0.1 || !inShip) && trailAddTimer >= TRAIL_ADD_INTERVAL;
                if (shouldAdd) {
                    mapTrail.push({ x: player.x, y: player.y, life: 1.0 });
                    trailAddTimer = 0;
                    if (mapTrail.length > mapTrailMaxLength) mapTrail.shift();
                }
                checkAssembler();
            }

            function updateShipInterior(dt) {
                if(joystick.active) { shipInteriorPlayer.vx+=joystick.dx*player.speed*0.8; shipInteriorPlayer.vy+=joystick.dy*player.speed*0.8; }
                shipInteriorPlayer.vx*=player.friction; shipInteriorPlayer.vy*=player.friction;
                const nx=shipInteriorPlayer.x+shipInteriorPlayer.vx, ny=shipInteriorPlayer.y+shipInteriorPlayer.vy;
                if(!checkShipInteriorCollision(nx, shipInteriorPlayer.y, shipInteriorPlayer.size)) shipInteriorPlayer.x=nx;
                if(!checkShipInteriorCollision(shipInteriorPlayer.x, ny, shipInteriorPlayer.size)) shipInteriorPlayer.y=ny;
                if(Math.abs(shipInteriorPlayer.vx)>0.1||Math.abs(shipInteriorPlayer.vy)>0.1) shipInteriorPlayer.angle=Math.atan2(shipInteriorPlayer.vy,shipInteriorPlayer.vx);
                inCockpitZone = shipInteriorPlayer.x>shipInteriorCockpitZone.x && shipInteriorPlayer.x<shipInteriorCockpitZone.x+shipInteriorCockpitZone.w &&
                                shipInteriorPlayer.y>shipInteriorCockpitZone.y && shipInteriorPlayer.y<shipInteriorCockpitZone.y+shipInteriorCockpitZone.h;
                if(inCockpitZone) { interactBtn.innerText="ENTER"; interactBtn.classList.add('visible'); }
                else interactBtn.classList.remove('visible');
                if(shipInteriorPlayer.x>shipInteriorExitZone.x && shipInteriorPlayer.x<shipInteriorExitZone.x+shipInteriorExitZone.w &&
                   shipInteriorPlayer.y>shipInteriorExitZone.y && shipInteriorPlayer.y<shipInteriorExitZone.y+shipInteriorExitZone.h) {
                    if(shipPreviousMode===MODE.MAP) {
                        inShipInterior=false; currentState=MODE.MAP; player.x=spaceship.x; player.y=spaceship.y+shipConfig.h/2+50; player.vx=player.vy=0;
                        shipInteriorHint.style.display='none'; hint.style.display='block'; hint.innerText="Fly to the Portal";
                        updatePauseButtonVisibility(); updateDriveZonesVisibility();
                    }
                }
            }

            // === ОПТИМИЗИРОВАННАЯ ОТРИСОВКА ТРЕЙЛА ===
            function drawPlayerTrail() {
                if (mapTrail.length < 2) return;
                const trailColor = getCustomColor('trailColor');
                ctx.save();
                ctx.translate(canvas.width/2, canvas.height/2);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 8;
                ctx.shadowColor = trailColor;
                
                // Рисуем сегменты с градиентом прозрачности
                for (let i = 1; i < mapTrail.length; i++) {
                    const prev = mapTrail[i-1];
                    const curr = mapTrail[i];
                    const alpha = (prev.life + curr.life) / 2; // средняя яркость сегмента
                    ctx.beginPath();
                    ctx.moveTo(prev.x - player.x, prev.y - player.y);
                    ctx.lineTo(curr.x - player.x, curr.y - player.y);
                    ctx.strokeStyle = trailColor;
                    ctx.globalAlpha = alpha * 0.6;
                    ctx.lineWidth = 5;
                    ctx.stroke();
                }
                ctx.restore();
            }

            // === ОТРИСОВКА (остальное идентично, но с мелкими улучшениями) ===
            function drawMap() {
                ctx.clearRect(0,0,canvas.width,canvas.height); applyBackground();
                if(currentState===MODE.SPACE) { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,canvas.width,canvas.height); }
                const grid=100; const offX=-player.x%grid, offY=-player.y%grid;
                ctx.beginPath(); ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
                if(currentState===MODE.SPACE) {
                    const half=grid/2; for(let y=offY; y<canvas.height; y+=half) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
                    let b0=offY-offX, minB=-canvas.width, maxB=canvas.height+canvas.width;
                    for(let b=b0-Math.floor((b0-minB)/grid)*grid; b<maxB; b+=grid) {
                        let x1=0,y1=b, x2=canvas.width,y2=b+canvas.width; if(y1<0){x1=-b;y1=0;} if(y2>canvas.height){x2=canvas.height-b;y2=canvas.height;}
                        ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
                    }
                    b0=offY+offX; for(let b=b0-Math.floor((b0-minB)/grid)*grid; b<maxB; b+=grid) {
                        let x1=0,y1=b, x2=canvas.width,y2=b-canvas.width; if(y1>canvas.height){x1=b-canvas.height;y1=canvas.height;} if(y2<0){x2=b;y2=0;}
                        ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
                    }
                } else {
                    for(let x=offX; x<canvas.width; x+=grid) { ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
                    for(let y=offY; y<canvas.height; y+=grid) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
                }
                ctx.stroke();
                ctx.save(); ctx.translate(canvas.width/2-player.x, canvas.height/2-player.y);
                if(currentState===MODE.MAP) {
                    ctx.fillStyle='rgba(128,128,128,0.2)'; ctx.fillRect(hangar.x,hangar.y,hangar.w,hangar.h);
                    ctx.shadowBlur=15; ctx.shadowColor='#fff'; ctx.fillStyle='rgba(255,255,255,0.8)';
                    hangarWalls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h)); ctx.shadowBlur=0;
                    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2; ctx.beginPath();
                    for(let x=hangar.x; x<=hangar.x+hangar.w; x+=BLOCK_SIZE) { ctx.moveTo(x,hangar.y); ctx.lineTo(x,hangar.y+hangar.h); }
                    for(let y=hangar.y; y<=hangar.y+hangar.h; y+=BLOCK_SIZE) { ctx.moveTo(hangar.x,y); ctx.lineTo(hangar.x+hangar.w,y); } ctx.stroke();
                    ctx.fillStyle='#333'; ctx.fillRect(assembler.x,assembler.y,assembler.w,assembler.h); ctx.fillStyle='#555';
                    assemblerWalls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
                    ctx.fillStyle='rgba(0,242,255,0.3)'; ctx.fillRect(terminalZone.x,terminalZone.y,terminalZone.w,terminalZone.h);
                }
                if(inShip && thrustPower>0.01) {
                    const c=getCustomColor('trailColor'); const backX=-Math.cos(spaceship.angle), backY=-Math.sin(spaceship.angle);
                    const sideX=-Math.sin(spaceship.angle), sideY=Math.cos(spaceship.angle); const nozzleX=spaceship.x+backX*65, nozzleY=spaceship.y+backY*65;
                    const flick=Math.random()*0.1+0.95, len=280*thrustPower*flick, wide=len*0.2, maxW=50*thrustPower;
                    const pStart={x:nozzleX,y:nozzleY}, pLeft={x:nozzleX+backX*wide+sideX*maxW, y:nozzleY+backY*wide+sideY*maxW};
                    const pRight={x:nozzleX+backX*wide-sideX*maxW, y:nozzleY+backY*wide-sideY*maxW}, pEnd={x:nozzleX+backX*len, y:nozzleY+backY*len};
                    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.7*thrustPower; ctx.shadowBlur=100*thrustPower;
                    ctx.strokeStyle=c; ctx.shadowColor=c; ctx.lineWidth=5; ctx.beginPath();
                    ctx.moveTo(pStart.x,pStart.y); ctx.lineTo(pLeft.x,pLeft.y); ctx.lineTo(pEnd.x,pEnd.y); ctx.lineTo(pRight.x,pRight.y); ctx.closePath(); ctx.stroke();
                    ctx.restore();
                }
                if(spaceship.built||spaceship.building) {
                    ctx.save(); ctx.translate(spaceship.x,spaceship.y); const sc=spaceship.building?(0.5+0.5*spaceship.alpha):1;
                    ctx.scale(sc,sc); ctx.globalAlpha=spaceship.alpha; ctx.rotate(spaceship.angle+Math.PI/2);
                    ctx.fillStyle=getCustomColor('playerColor'); ctx.shadowBlur=15; ctx.shadowColor=getCustomColor('playerColor');
                    ctx.beginPath(); ctx.moveTo(0,-90); ctx.lineTo(55,80); ctx.lineTo(0,60); ctx.lineTo(-55,80); ctx.closePath(); ctx.fill();
                    ctx.restore();
                }
                ctx.restore();
                if(!inShip && currentState===MODE.MAP) drawPlayerTrail();
                if(currentState===MODE.MAP) {
                    ctx.save(); ctx.translate(canvas.width/2+portal.x-player.x, canvas.height/2+portal.y-player.y);
                    ctx.beginPath(); ctx.arc(0,0,portal.radius,0,Math.PI*2); ctx.strokeStyle=portal.color; ctx.lineWidth=3; ctx.shadowBlur=15; ctx.shadowColor=portal.color;
                    ctx.stroke(); ctx.fillStyle='rgba(0,242,255,0.2)'; ctx.fill(); ctx.restore();
                    ctx.save(); ctx.translate(canvas.width/2+shopPortal.x-player.x, canvas.height/2+shopPortal.y-player.y);
                    ctx.beginPath(); ctx.arc(0,0,shopPortal.radius,0,Math.PI*2); ctx.strokeStyle=shopPortal.color; ctx.lineWidth=3; ctx.shadowBlur=15; ctx.shadowColor=shopPortal.color;
                    ctx.stroke(); ctx.fillStyle='rgba(255,68,68,0.2)'; ctx.fill(); ctx.restore();
                }
                if(!inShip && !inShipInterior && currentState===MODE.MAP) {
                    ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(player.angle);
                    ctx.beginPath(); ctx.moveTo(player.size,0); ctx.lineTo(-player.size,-player.size/1.5); ctx.lineTo(-player.size,player.size/1.5); ctx.closePath();
                    ctx.fillStyle=getCustomColor('playerColor'); ctx.shadowBlur=15; ctx.shadowColor=getCustomColor('playerColor'); ctx.fill();
                    ctx.restore();
                }
                if(!inShip && currentState===MODE.MAP) drawCompass();
            }

            function drawCompass() {
                const cx=canvas.width/2, cy=canvas.height/2, r=60, arc=Math.PI/6;
                const a1=Math.atan2(portal.y-player.y, portal.x-player.x), a2=Math.atan2(shopPortal.y-player.y, shopPortal.x-player.x);
                const a3=Math.atan2((hangar.y+hangar.h/2)-player.y, (hangar.x+hangar.w/2)-player.x);
                ctx.save(); ctx.translate(cx,cy); ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2; ctx.stroke();
                ctx.beginPath(); ctx.arc(0,0,r,a1-arc/2,a1+arc/2); ctx.strokeStyle=portal.color; ctx.lineWidth=3; ctx.shadowBlur=10; ctx.shadowColor=portal.color; ctx.stroke();
                ctx.beginPath(); ctx.arc(0,0,r,a2-arc/2,a2+arc/2); ctx.strokeStyle=shopPortal.color; ctx.shadowColor=shopPortal.color; ctx.stroke();
                ctx.beginPath(); ctx.arc(0,0,r,a3-arc/2,a3+arc/2); ctx.strokeStyle='#0f0'; ctx.shadowColor='#0f0'; ctx.stroke(); ctx.restore();
            }

            function drawShop() {
                ctx.clearRect(0,0,canvas.width,canvas.height); applyBackground(); ctx.save(); ctx.translate(canvas.width/2,canvas.height/2); ctx.scale(shopCamera.zoom,shopCamera.zoom); ctx.translate(-shopPlayer.x,-shopPlayer.y);
                const half=shopConfig.gridCount*shopConfig.gridSize/2; ctx.fillStyle='rgba(128,128,128,0.2)'; ctx.fillRect(-half,-half,shopConfig.gridCount*shopConfig.gridSize,shopConfig.gridCount*shopConfig.gridSize);
                ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
                for(let x=-half;x<=half;x+=shopConfig.gridSize){ctx.beginPath();ctx.moveTo(x,-half);ctx.lineTo(x,half);ctx.stroke();}
                for(let y=-half;y<=half;y+=shopConfig.gridSize){ctx.beginPath();ctx.moveTo(-half,y);ctx.lineTo(half,y);ctx.stroke();}
                for(const [k,s] of Object.entries(shopZones)) {
                    ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.shadowBlur=15; ctx.shadowColor='#fff'; ctx.strokeRect(s.x,s.y,s.w,s.h); ctx.shadowBlur=0;
                    if(currentShop===k) { ctx.fillStyle='rgba(76,175,80,0.5)'; ctx.fillRect(s.cashRegister.x,s.cashRegister.y,s.cashRegister.w,s.cashRegister.h); }
                    ctx.fillStyle='#fff'; ctx.font='bold 24px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(s.name, s.x+s.w/2, s.y+s.h/2);
                }
                ctx.save(); ctx.translate(shopPlayer.x,shopPlayer.y); ctx.rotate(shopPlayer.angle);
                ctx.beginPath(); ctx.moveTo(shopPlayer.size,0); ctx.lineTo(-shopPlayer.size,-shopPlayer.size/1.5); ctx.lineTo(-shopPlayer.size,shopPlayer.size/1.5); ctx.closePath();
                ctx.fillStyle=getCustomColor('playerColor'); ctx.shadowBlur=15; ctx.shadowColor=getCustomColor('playerColor'); ctx.fill(); ctx.restore(); ctx.restore();
            }

            function drawShipInterior() {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.save(); ctx.translate(canvas.width/2,canvas.height/2);
                ctx.fillStyle='#111'; shipInteriorWalls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
                ctx.fillStyle='rgba(76,175,80,0.3)'; ctx.fillRect(shipInteriorCockpitZone.x,shipInteriorCockpitZone.y,shipInteriorCockpitZone.w,shipInteriorCockpitZone.h);
                ctx.fillStyle=shipInteriorExitZone.color; ctx.fillRect(shipInteriorExitZone.x,shipInteriorExitZone.y,shipInteriorExitZone.w,shipInteriorExitZone.h);
                ctx.save(); ctx.translate(shipInteriorPlayer.x,shipInteriorPlayer.y); ctx.rotate(shipInteriorPlayer.angle);
                ctx.beginPath(); ctx.moveTo(shipInteriorPlayer.size,0); ctx.lineTo(-shipInteriorPlayer.size,-shipInteriorPlayer.size/1.5); ctx.lineTo(-shipInteriorPlayer.size,shipInteriorPlayer.size/1.5); ctx.closePath();
                ctx.fillStyle=getCustomColor('playerColor'); ctx.shadowBlur=15; ctx.shadowColor=getCustomColor('playerColor'); ctx.fill(); ctx.restore(); ctx.restore();
            }

            function drawTunnel() {
                ctx.clearRect(0,0,canvas.width,canvas.height); applyBackground(); ctx.save();
                ctx.shadowBlur=100; ctx.shadowColor=getCustomColor('tunnelColor'); ctx.strokeStyle=getCustomColor('tunnelColor'); ctx.lineWidth=5; ctx.lineJoin='round';
                ctx.beginPath(); tunnelPoints.forEach((p,i)=> i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
                ctx.beginPath(); tunnelPoints.forEach((p,i)=> i===0?ctx.moveTo(p.x,p.y+tunnelGap):ctx.lineTo(p.x,p.y+tunnelGap)); ctx.stroke();
                if(tunnelTrail.length>1) {
                    ctx.shadowBlur=30; ctx.strokeStyle=getCustomColor('trailColor'); ctx.lineWidth=5; ctx.beginPath();
                    ctx.moveTo(tunnelTrail[0].x,tunnelTrail[0].y); tunnelTrail.forEach(t=>ctx.lineTo(t.x,t.y)); ctx.stroke();
                }
                ctx.save(); ctx.translate(playerX,tunnelPlayerY); let ang=0; if(tunnelDirection===1) ang=-Math.PI/4; else if(tunnelDirection===-1) ang=Math.PI/4;
                ctx.rotate(ang); ctx.shadowBlur=50; ctx.shadowColor=getCustomColor('playerColor'); ctx.fillStyle=getCustomColor('playerColor');
                ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-12,-13); ctx.lineTo(-12,13); ctx.closePath(); ctx.fill(); ctx.restore(); ctx.restore();
            }

            function drawRadar() {
                if(!inShip) return; const w=radarCanvas.width, h=radarCanvas.height; radarCtx.clearRect(0,0,w,h);
                radarCtx.beginPath(); radarCtx.arc(w/2,h/2,w/2-2,0,Math.PI*2); radarCtx.strokeStyle='rgba(255,255,255,0.3)'; radarCtx.lineWidth=3; radarCtx.stroke();
                const cx=w/2, cy=h/2, r=w/2-6;
                if(currentState===MODE.MAP) {
                    const drawM=(ang,col)=>{ const x=cx+Math.cos(ang)*r, y=cy+Math.sin(ang)*r; radarCtx.beginPath(); radarCtx.arc(x,y,10,0,Math.PI*2); radarCtx.fillStyle=col; radarCtx.shadowBlur=8; radarCtx.shadowColor=col; radarCtx.fill(); };
                    drawM(Math.atan2(portal.y-spaceship.y, portal.x-spaceship.x), portal.color);
                    drawM(Math.atan2(shopPortal.y-spaceship.y, shopPortal.x-spaceship.x), shopPortal.color);
                    drawM(Math.atan2((hangar.y+hangar.h/2)-spaceship.y, (hangar.x+hangar.w/2)-spaceship.x), '#0f0');
                }
                radarCtx.save(); radarCtx.translate(cx,cy); radarCtx.rotate(spaceship.angle);
                radarCtx.beginPath(); radarCtx.moveTo(25,0); radarCtx.lineTo(-20,-15); radarCtx.lineTo(-20,15); radarCtx.closePath();
                radarCtx.fillStyle=getCustomColor('playerColor'); radarCtx.shadowBlur=10; radarCtx.shadowColor=getCustomColor('playerColor'); radarCtx.fill(); radarCtx.restore();
            }

            // Nav
            function toggleNavMenu() {
                if(!inShip||(currentState!==MODE.MAP&&currentState!==MODE.SPACE)) return;
                navMenuOpen=!navMenuOpen; if(navMenuOpen) {
                    navMenu.classList.add('active');
                    if(currentState===MODE.MAP) { navPosition.innerText='Planet'; navLiftLand.innerText='LIFT'; }
                    else { navPosition.innerText='KOCMOC'; navLiftLand.innerText='LAND'; }
                    if(currentState===MODE.SPACE) { selectedPlanet=null; planetHome.classList.remove('selected'); navLiftLand.classList.add('disabled'); }
                    else navLiftLand.classList.remove('disabled');
                } else navMenu.classList.remove('active');
            }
            navBtn.addEventListener('click', e=>{ e.preventDefault(); toggleNavMenu(); });
            navMenu.addEventListener('click', e=>{ if(e.target===navMenu) toggleNavMenu(); });
            planetHome.addEventListener('click', ()=>{ if(currentState!==MODE.SPACE) return; selectedPlanet='home'; planetHome.classList.add('selected'); navLiftLand.classList.remove('disabled'); });
            navLiftLand.addEventListener('click', ()=>{
                if(currentState===MODE.MAP && inShip) { currentState=MODE.SPACE; shipPreviousMode=MODE.SPACE; spaceship.x=0;spaceship.y=0;spaceship.vx=0;spaceship.vy=0; player.x=0;player.y=0; hint.innerText="You are in space"; toggleNavMenu(); }
                else if(currentState===MODE.SPACE && selectedPlanet==='home') { currentState=MODE.MAP; shipPreviousMode=MODE.MAP; spaceship.x=0;spaceship.y=0;spaceship.vx=0;spaceship.vy=0; player.x=0;player.y=0; hint.innerText="Fly to the Portal"; toggleNavMenu(); }
            });

            // Loop
            function loop(ts) {
                if(!lastTime) lastTime=ts; const dt=Math.min((ts-lastTime)/1000,0.1); lastTime=ts;
                if(currentState===MODE.MAP||currentState===MODE.SPACE) { updateMap(dt); drawMap(); if(inShip) drawRadar(); }
                else if(currentState===MODE.TUNNEL) { updateTunnel(dt); drawTunnel(); }
                else if(currentState===MODE.SHOP) { updateShop(dt); drawShop(); }
                else if(currentState===MODE.SHIP_INTERIOR) { updateShipInterior(dt); drawShipInterior(); }
                if(currentState!==MODE.PAUSED) requestAnimationFrame(loop);
            }

            updatePauseButtonVisibility(); updateDriveZonesVisibility(); requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
