<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonWaveINSPACEE(SPACE)</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #4caf50;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: var(--font-family);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        /* --- НОВЫЙ БЛОК ВРЕМЕНИ И РЕКОРДА (ВЕРХНИЙ ПРАВЫЙ УГОЛ) --- */
        #top-right-info {
            position: fixed;
            top: 20px;
            right: 80px; /* чтобы не налезать на кнопку паузы */
            z-index: 200;
            color: white;
            text-align: right;
            font-family: var(--font-family);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none; /* чтобы не мешать кликам по кнопке паузы */
        }
        #clock {
            font-size: 2rem;
            font-weight: 300;
            line-height: 1.2;
        }
        #score-display {
            font-size: 1rem;
            opacity: 0.8;
        }
        /* --- КНОПКА ПАУЗЫ --- */
        #pause-btn {
            position: fixed;
            top: 25px;
            right: 20px;
            width: 40px;
            height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgb(180, 255, 255);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 210;
            color: #fff;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 5px #fff;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #pause-btn:active {
            background: rgba(255,255,255,0.2);
        }
        /* --- МЕНЮ ПАУЗЫ --- */
        #pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            backdrop-filter: blur(7px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #pause-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        .menu-box {
            background: transparent;
            border: none;
            padding: 0;
            border-radius: 0;
            text-align: center;
            color: white;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .menu-box h2 {
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
            color: #fff;
        }
        .menu-btn {
            background: rgba(0,0,0,0.1);
            border: 2px solid rgb(200, 255, 255);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0);
            text-shadow: 0 0 5px #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0);
        }
        #joystick-zone {
            position: absolute;
            bottom: 80px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 90;
            transition: opacity 0.3s;
        }
        #joystick-zone.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s;
        }
        .drive-zone {
            position: fixed;
            bottom: 0;
            width: 30%;
            height: 50%;
            background: rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 95;
            pointer-events: auto;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .drive-zone.left {
            left: 0;
        }
        .drive-zone.right {
            right: 0;
        }
        .drive-zone.pressed {
            background: rgba(255, 255, 255, 0.4);
        }
        .drive-zone.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #hint {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 50;
        }
        #shop-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        #tunnel-score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px #ffffff;
            z-index: 50;
            display: none;
        }
        #tunnel-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
            text-align: center;
        }
        #tunnel-timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 4rem;
            font-weight: bold;
            z-index: 50;
            display: none;
            text-shadow: 0 0 20px #ffffff;
        }
        /* === COLOR PICKER MENU === */
        #color-picker-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 5px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }
        #color-picker-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        #color-picker-menu h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }
        .color-options {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .color-btn, .gradient-btn {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .color-btn:hover, .gradient-btn:hover {
            transform: scale(1.15);
            border-color: white;
        }
        .color-btn.selected, .gradient-btn.selected {
            border-color: #4caf50;
            box-shadow: 0 0 15px #4caf50;
        }
        .color-btn.default { background: #ffffff; }
        .color-btn.red { background: #ff4444; }
        .color-btn.blue { background: #4444ff; }
        .color-btn.yellow { background: #ffcc00; }
        .color-btn.green { background: #4caf50; }
        .color-btn.cyan { background: #00bcd4; }
        .gradient-btn.yellow-blue {
            background: linear-gradient(135deg, #ffff00, #00ffff);
        }
        .gradient-btn.red-blue {
            background: linear-gradient(135deg, #ff4444, #aa44ff, #4444ff);
        }
        .gradient-btn.black {
            background: #000000;
        }

        /* === ASSEMBLER & SHIP UI === */
        #assembler-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 5px;
            text-align: center;
            color: white;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 280px;
        }
        #assembler-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        #assembler-menu h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            color: #ff00009a;
        }
        .build-progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .build-progress-bar {
            height: 100%;
            width: 0%;
            background: #ffffff;
            transition: width 0.1s linear;
        }
        /* === УНИВЕРСАЛЬНАЯ КНОПКА ВЗАИМОДЕЙСТВИЯ (ФИКСИРОВАННАЯ) === */
        #interact-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            border: 2px solid #ff0;
            padding: 10px 20px;
            border-radius: 5px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 0 20px #ff0;
            text-shadow: 0 0 5px #fff;
        }
        #interact-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #interact-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        /* === НОВАЯ ГОЛОГРАФИЧЕСКАЯ ПАНЕЛЬ УПРАВЛЕНИЯ КОРАБЛЁМ === */
        #ship-control-panel {
            position: fixed;
            top: 50px;
            left: 20px;
            width: 30%;
            height: 30%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            padding: 15px 20px;
            border-radius: 0;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #ship-control-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }
        /* Новый контейнер для верхнего ряда (радар + кнопка) */
        .panel-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 70%;
        }
        #radarCanvas {
            flex: 0 1 auto;
            width: auto;
            max-width: 100%;
            aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(150, 255, 255, 0.5);
            height: 100%;
        }
        /* Кнопка навигации N.S.*/
        .nav-button {
            flex: 1;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgb(170, 255, 255);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .nav-button:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        #thrust-panel {
            width: 100%;
            height: 20%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #thrust-panel-fill {
            height: 100%;
            width: 0%;
            background: #ffffff;
            box-shadow: 0 0 15px #00ffff;
            transition: width 0.05s linear;
        }
        #ship-interior-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            display: none;
            text-align: center;
        }
        /* === НОВОЕ НАВИГАЦИОННОЕ МЕНЮ === */
        #nav-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            backdrop-filter: blur(7px);
            z-index: 260; /* выше pause-menu (200) */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #nav-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        #nav-menu .menu-box {
            min-width: 280px;
        }
        #nav-menu h2, #nav-menu h3 {
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(170, 255, 255, 0.3);
        }
        #nav-menu h3 {
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .planets-list {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px 0;
            margin-bottom: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .planet-item {
            padding: 8px 15px;
            color: rgba(255,255,255,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .planet-item:hover {
            background: rgba(255,255,255,0.2);
        }
        .planet-item.selected {
            background: rgba(76, 175, 80, 0.3);
            border-left: 3px solid #00FF00;
        }
        .planet-item:last-child {
            border-bottom: none;
        }
        /* Кнопка LIFT/LAND в меню */
        #nav-lift-land {
            border-color: rgb(180, 255, 255);
            color: rgb(180, 255, 255);
            margin-top: 10px;
        }
        #nav-lift-land.disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: gray;
            color: gray;
        }

        @media (orientation: portrait) {
            #ship-control-panel .panel-row {
                flex-direction: column;
                height: auto;
                gap: 10px;
            }
            #radarCanvas {
                width: auto;
                max-width: 100%;
                height: 100%;
                aspect-ratio: 1 / 1;
            }
            .nav-button {
                width: 100%;
                height: 100%;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- НОВЫЙ БЛОК ВРЕМЕНИ И РЕКОРДА -->
    <div id="top-right-info">
        <div id="clock">00:00</div>
        <div id="score-display">Best: 0</div>
    </div>

    <div id="hint">Fly to the Portal</div>
    <div id="shop-hint">Fly to corridor end to Exit</div>
    <div id="tunnel-hint">Tap left side to fly up, right side to fly down</div>
    <div id="ship-interior-hint">Walk to green zone to exit ship</div>
    <div id="tunnel-score">0</div>
    <div id="tunnel-timer">3</div>
    <div id="pause-btn">❚❚</div>

    <div id="joystick-zone">
        <div class="joystick-base" id="joy-base">
            <div class="joystick-stick" id="joy-stick"></div>
        </div>
    </div>
    <div id="drive-left-zone" class="drive-zone left hidden"></div>
    <div id="drive-right-zone" class="drive-zone right hidden"></div>

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ КОРАБЛЁМ (с новым верхним рядом) -->
    <div id="ship-control-panel">
        <div class="panel-row">
            <canvas id="radarCanvas" width="400" height="400"></canvas>
            <div id="nav-btn" class="nav-button">N.S.</div>
        </div>
        <div id="thrust-panel">
            <div id="thrust-panel-fill"></div>
        </div>
    </div>

    <!-- НАВИГАЦИОННОЕ МЕНЮ (стилизовано под меню паузы) -->
    <div id="nav-menu">
        <div class="menu-box">
            <h2 id="nav-position">Planet</h2>
            <div class="planets-list">
                <h3>Planets:</h3>
                <div class="planet-item" id="planet-home">Home</div>
                <!-- Здесь позже появятся другие планеты -->
            </div>
            <button class="menu-btn" id="nav-lift-land">LIFT</button>
        </div>
    </div>

    <div id="pause-menu">
        <div class="menu-box">
            <h2>PAUSE</h2>
            <button class="menu-btn" id="resume-btn">RESUME</button>
            <button class="menu-btn" id="exit-btn">EXIT</button>
        </div>
    </div>
    <!-- COLOR PICKER MENU -->
    <div id="color-picker-menu">
        <h2 id="picker-title">Select Color</h2>
        <div class="color-options" id="color-options">
            <div class="color-btn default" data-color="default"></div>
            <div class="color-btn red" data-color="red"></div>
            <div class="color-btn blue" data-color="blue"></div>
            <div class="color-btn yellow" data-color="yellow"></div>
            <div class="color-btn green" data-color="green"></div>
            <div class="color-btn cyan" data-color="cyan"></div>
        </div>
        <div class="color-options" id="gradient-options" style="display: none;">
            <div class="gradient-btn yellow-blue" data-gradient="yellow-blue" title="Жёлто-голубой"></div>
            <div class="gradient-btn red-blue" data-gradient="red-blue" title="Красно-голубой"></div>
            <div class="gradient-btn black" data-gradient="black" title="Чёрный"></div>
        </div>
    </div>
    <!-- ASSEMBLER MENU -->
    <div id="assembler-menu">
        <h2>ASSEMBLY V.164</h2>
        <p id="assembler-status">Ready to Build</p>
        <button class="menu-btn" id="build-btn" style="border-color: #4caf50; color: #4caf50;">BUILD SHIP</button>
        <div class="build-progress" id="build-progress-container">
            <div class="build-progress-bar" id="build-progress-bar"></div>
        </div>
    </div>
    <!-- УНИВЕРСАЛЬНАЯ КНОПКА ВЗАИМОДЕЙСТВИЯ -->
    <div id="interact-btn">ENTER</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        // --- CONFIG & STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const MODE = {
            MAP: 'MAP',
            TUNNEL: 'TUNNEL',
            SHOP: 'SHOP',
            PAUSED: 'PAUSED',
            SHIP_INTERIOR: 'SHIP_INTERIOR',
            SPACE: 'SPACE'          // Новый режим космоса
        };
        let currentState = MODE.MAP;
        let shipPreviousMode = MODE.MAP; // запоминает, в каком режиме находится корабль (карта или космос)
        let lastTime = 0;

        // Player (Map)
        const player = {
            x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15, speed: 0.25, friction: 0.96
        };

        // === PLAYER TRAIL (MAP) ===
        const mapTrail = [];
        const mapTrailMaxLength = 100;

        // Portals
        const portal = { x: 500, y: -500, radius: 40, active: true, color: '#00f2ff' };
        const shopPortal = { x: -600, y: 0, radius: 40, active: true, color: '#ff4444' };

        // Joystick
        const joystick = {
            active: false, originX: 0, originY: 0, dx: 0, dy: 0, maxRadius: 35
        };

        // Tunnel Game State
        let tunnelPoints = [];
        let tunnelGap = 100;
        let tunnelSpeed = 3.5;
        let tunnelMoveSpeed = 3.5;
        let tunnelScore = 0;
        let tunnelPlayerY = 0;
        let tunnelDirection = 0;
        let tunnelTrail = [];
        const tunnelTrailMaxLength = 200;
        const playerX = 100;
        let tunnelTimer = 0;
        const TUNNEL_START_DELAY = 1.0;

        // High Score
        let highScore = parseInt(localStorage.getItem('tunnelHighScore')) || 0;
        document.getElementById('score-display').innerText = `Best: ${highScore}`;

        // === SHOP STATE ===
        const shopConfig = {
            gridSize: 100,
            gridCount: 10,
            corridorWidth: 200,
            shopSize: 400,
            wallThickness: 10
        };
        let shopPlayer = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, size: 15 };
        let shopCamera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
        let currentShop = null;
        let activeColorPicker = null;

        // === SHOP WALLS (коллизии) ===
        const shopWalls = [
            { x: -500, y: -500, w: 350, h: 10, type: 'collision' },
            { x: 150, y: -500, w: 350, h: 10, type: 'collision' },
            { x: -500, y: 490, w: 350, h: 10, type: 'collision' },
            { x: 150, y: 490, w: 350, h: 10, type: 'collision' },
            { x: -500, y: -500, w: 10, h: 350, type: 'collision' },
            { x: -500, y: 150, w: 10, h: 350, type: 'collision' },
            { x: 490, y: -500, w: 10, h: 350, type: 'collision' },
            { x: 490, y: 150, w: 10, h: 350, type: 'collision' }
        ];

        // === SHOP ZONES ===
        const shopZones = {
            trail: {
                name: 'TRAIL',
                x: -500, y: -500, w: 400, h: 400,

        // --- JOYSTICK INPUT ---
        function handleStart(e) {
            if (currentState !== MODE.MAP && currentState !== MODE.SHOP && currentState !== MODE.SHIP_INTERIOR && currentState !== MODE.SPACE) return;
            joystick.active = true;
            const rect = joyBase.getBoundingClientRect();
            joystick.originX = rect.left + rect.width / 2;
            joystick.originY = rect.top + rect.height / 2;
            handleMove(e);
        }
        function handleMove(e) {
            if (!joystick.active) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaX = clientX - joystick.originX;
            const deltaY = clientY - joystick.originY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const angle = Math.atan2(deltaY, deltaX);
            const clampedDist = Math.min(distance, joystick.maxRadius);
            joystick.dx = (clampedDist / joystick.maxRadius) * Math.cos(angle);
            joystick.dy = (clampedDist / joystick.maxRadius) * Math.sin(angle);
            const stickX = joystick.dx * joystick.maxRadius;
            const stickY = joystick.dy * joystick.maxRadius;
            joyStick.style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;
        }
        function handleEnd() {
            joystick.active = false;
            joystick.dx = 0;
            joystick.dy = 0;
            joyStick.style.transform = `translate(-50%, -50%)`;
        }

        // === COLLISION DETECTION ===
        function checkWallCollision(newX, newY) {
            const playerRadius = shopPlayer.size;
            for (const wall of shopWalls) {
                const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                const dx = newX - closestX;
                const dy = newY - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < playerRadius) return true;
            }
            return false;
        }

        function checkShipInteriorCollision(newX, newY, radius) {
            for (const wall of shipInteriorWalls) {
                const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                const dx = newX - closestX;
                const dy = newY - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < radius) return true;
            }
            return false;
        }

        function checkHangarCollision(newX, newY, radius) {
            for (const wall of hangarWalls) {
                const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                const dx = newX - closestX;
                const dy = newY - closestY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < radius) return true;
            }
            if (!inShip && !inShipInterior) {
                for (const wall of assemblerWalls) {
                    const closestX = Math.max(wall.x, Math.min(newX, wall.x + wall.w));
                    const closestY = Math.max(wall.y, Math.min(newY, wall.y + wall.h));
                    const dx = newX - closestX;
                    const dy = newY - closestY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < radius) return true;
                }
            }
            return false;
        }

        function checkShopEntry() {
            for (const [key, shop] of Object.entries(shopZones)) {
                if (shopPlayer.x > shop.x && shopPlayer.x < shop.x + shop.w &&
                    shopPlayer.y > shop.y && shopPlayer.y < shop.y + shop.h) {
                    if (currentShop !== key) {
                        currentShop = key;
                        shopCamera.targetZoom = 1.5;
                    }
                    return;
                }
            }
            if (currentShop !== null) {
                currentShop = null;
                shopCamera.targetZoom = 1;
            }
            for (const zone of exitZones) {
                if (shopPlayer.x > zone.x && shopPlayer.x < zone.x + zone.w &&
                    shopPlayer.y > zone.y && shopPlayer.y < zone.y + zone.h) {
                    exitShop();
                    return;
                }
            }
        }

        function checkCashRegister() {
            if (!currentShop) return;

            shopPlayer.vy *= player.friction;

            const newY = shopPlayer.y + shopPlayer.vy;
            if (!checkWallCollision(newX, shopPlayer.y)) shopPlayer.x = newX;
            if (!checkWallCollision(shopPlayer.x, newY)) shopPlayer.y = newY;
            if (Math.abs(shopPlayer.vx) > 0.1 || Math.abs(shopPlayer.vy) > 0.1) {
                shopPlayer.angle = Math.atan2(shopPlayer.vy, shopPlayer.vx);
            }
            shopCamera.zoom += (shopCamera.targetZoom - shopCamera.zoom) * 5 * deltaTime;

        // === ASSEMBLER LOGIC ===
        let assemblerActive = false;
        function checkAssembler() {
            // Assembler menu logic (only when not in ship/interior)
            if (!inShip && !inShipInterior) {
                const inTerminal = player.x > terminalZone.x && player.x < terminalZone.x + terminalZone.w &&
                    player.y > terminalZone.y && player.y < terminalZone.y + terminalZone.h;
                if (inTerminal) {
                    if (!assemblerMenu.classList.contains('active')) {
                        assemblerMenu.classList.add('active');
                        assemblerActive = true;
                    }
                } else {
                    if (assemblerMenu.classList.contains('active') && !spaceship.building) {
                        assemblerMenu.classList.remove('active');
                        assemblerActive = false;
                    }
                }
            }

            // Interact button logic
            if (inShip) {
                interactBtn.innerText = "EXIT";
                interactBtn.classList.add('visible');
            } else if (inShipInterior) {
                // handled by updateShipInterior
            } else if (spaceship.built && currentState === MODE.MAP) {
                const dx = player.x - spaceship.x;
                const dy = player.y - spaceship.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 250) {
                    interactBtn.innerText = "ENTER";

                    interactBtn.classList.remove('visible');

        interactBtn.addEventListener('click', () => {

            } else if (inShip) {

        // --- TUNNEL FUNCTIONS ---
        function startTunnel() {
            currentState = MODE.TUNNEL;
            resetTunnel();
            tunnelScoreEl.style.display = 'block';
            tunnelHint.style.display = 'block';
            tunnelTimerEl.style.display = 'block';
            joyZone.classList.add('hidden');
            hint.style.display = 'none';
            shopHint.style.display = 'none';
            pauseBtn.style.display = 'flex';
            updatePauseButtonVisibility();
            updateDriveZonesVisibility();
        }

        function resetTunnel() {
            tunnelScore = 0;
            tunnelPoints = [];
            tunnelTrail = [];
            tunnelPlayerY = canvas.height / 2;
            tunnelDirection = 0;
            tunnelTimer = TUNNEL_START_DELAY;
            tunnelGap = Math.max(150, Math.floor(canvas.height * 0.25));
            tunnelSpeed = 3.5;
            initTunnel();
            const startTunnel = getTunnelAt(playerX);
            tunnelPlayerY = startTunnel.y + tunnelGap / 2;
            tunnelScoreEl.innerText = '0';
        }

        function initTunnel() {
            tunnelPoints = [];
            let startY = (canvas.height - tunnelGap) / 2;
            startY = Math.max(30, Math.min(canvas.height - tunnelGap - 30, startY));
            for (let i = 0; i < 40; i++) {
                tunnelPoints.push({ x: i * 40, y: startY });
            }
            for (let i = 40; i < 80; i++) {
                addPoint();
            }
        }

        function addPoint() {
            const lastPoint = tunnelPoints[tunnelPoints.length - 1];
            const stepX = 40;
            const x = lastPoint.x + stepX;
            let dy = (Math.random() > 0.5) ? stepX : -stepX;
            let candidateY = lastPoint.y + dy;
            const minY = 30;
            const maxY = canvas.height - tunnelGap - 30;
            if (candidateY < minY || candidateY > maxY) {
                dy = -dy;
                candidateY = lastPoint.y + dy;
            }
            const newY = Math.max(minY, Math.min(maxY, candidateY));
            tunnelPoints.push({ x, y: newY });
        }

        function getTunnelAt(x) {
            for (let i = 0; i < tunnelPoints.length - 1; i++) {
                if (x >= tunnelPoints[i].x && x <= tunnelPoints[i + 1].x) {
                    const t = (x - tunnelPoints[i].x) / (tunnelPoints[i + 1].x - tunnelPoints[i].x);
                    return { y: tunnelPoints[i].y + t * (tunnelPoints[i + 1].y - tunnelPoints[i].y) };
                }
            }
            return { y: canvas.height / 2 };
        }

        function updateTunnel(deltaTime) {
            if (tunnelTimer > 0) {
                tunnelTimer -= deltaTime;
                if (tunnelTimer <= 0) {
                    tunnelTimer = 0;
                    tunnelTimerEl.style.display = 'none';
                } else {
                    tunnelTimerEl.innerText = Math.ceil(tunnelTimer);
                }
            } else {
                if (tunnelDirection !== 0) {
                    tunnelPlayerY -= tunnelDirection * tunnelMoveSpeed;
                }
            }
            tunnelScore += deltaTime * 15;
            tunnelScoreEl.innerText = Math.floor(tunnelScore);
            if (tunnelScore > highScore) {
                highScore = Math.floor(tunnelScore);
                localStorage.setItem('tunnelHighScore', highScore);
                document.getElementById('score-display').innerText = `Best: ${highScore}`;
            }
            for (let p of tunnelPoints) {
                p.x -= tunnelSpeed;
            }
            if (tunnelPoints.length > 0 && tunnelPoints[0].x < -100) {
                tunnelPoints.shift();
                addPoint();
            }
            tunnelTrail.push({ x: playerX, y: tunnelPlayerY });
            for (let t of tunnelTrail) {
                t.x -= tunnelSpeed;
            }
            if (tunnelTrail.length > tunnelTrailMaxLength) tunnelTrail.shift();
            const tunnel = getTunnelAt(playerX);
            if (tunnelPlayerY < tunnel.y || tunnelPlayerY > tunnel.y + tunnelGap) {
                onTunnelCrash();
            }
        }

        function onTunnelCrash() {
            canvas.style.filter = 'brightness(1.5)';
            setTimeout(() => { canvas.style.filter = ''; }, 100);
            resetTunnel();
        }

        // === ЦВЕТА ===
        function getCustomColor(colorKey) {
            const colorName = customization[colorKey];
            if (colorName === 'default' || !colorValues[colorName]) return '#ffffff';
            return colorValues[colorName];
        }

        // === ФОН ===
        function applyBackground() {
            const gradType = customization.mapGradient;
            if (gradType === 'black') {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                let gradient;
                if (gradType === 'yellow-blue') {
                    gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gradient.addColorStop(0, '#ffff00');
                    gradient.addColorStop(1, '#00ffff');
                } else if (gradType === 'red-blue') {
                    gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gradient.addColorStop(0, '#ff4444');
                    gradient.addColorStop(0.5, '#aa44ff');
                    gradient.addColorStop(1, '#4444ff');
                } else {
                    gradient = '#000000';
                }
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.3;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
            }
        }

        // === НОВАЯ ФУНКЦИЯ ДЛЯ ОТОБРАЖЕНИЯ РЕАЛЬНОГО ВРЕМЕНИ ===
        function updateRealTimeClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            clockEl.innerText = `${hours}:${minutes}`;
        }
        setInterval(updateRealTimeClock, 1000);
        updateRealTimeClock(); // установить сразу

        // === MAP LOGIC ===
        function updateMap(deltaTime) {
            if (spaceship.building) {
                spaceship.buildProgress += deltaTime * 20;
                if (spaceship.buildProgress >= 100) {
                    spaceship.buildProgress = 100;
                    spaceship.building = false;
                    spaceship.built = true;
                    spaceship.alpha = 1;
                    assemblerStatus.innerText = "Ship Ready!";
                    buildProgressContainer.style.display = 'none';
                } else {
                    buildProgressBar.style.width = `${spaceship.buildProgress}%`;
                    spaceship.alpha = spaceship.buildProgress / 100;
                }
            }

            // Control Logic
            if (inShip && !navMenuOpen) {
                const turnAcceleration = 30;
                const maxTurnSpeed = 60;
                const angularFriction = 0.98;

                if (leftPressed && !rightPressed) {
                    spaceship.angularVelocity -= turnAcceleration * deltaTime;
                } else if (rightPressed && !leftPressed) {
                    spaceship.angularVelocity += turnAcceleration * deltaTime;
                }
                spaceship.angularVelocity = Math.max(-maxTurnSpeed, Math.min(maxTurnSpeed, spaceship.angularVelocity));
                spaceship.angularVelocity *= angularFriction;
                spaceship.angle += spaceship.angularVelocity * deltaTime;

                if (thrustIncreasing) {
                    thrustPower = Math.min(maxThrustPower, thrustPower + thrustRiseRate * deltaTime);
                } else if (thrustDecreasing) {
                    thrustPower = Math.max(0, thrustPower - thrustFallRate * deltaTime);
                }
                const shipThrust = 0.30;
                spaceship.vx += Math.cos(spaceship.angle) * shipThrust * thrustPower;
                spaceship.vy += Math.sin(spaceship.angle) * shipThrust * thrustPower;

                spaceship.vx *= 0.985;
                spaceship.vy *= 0.985;
                spaceship.x += spaceship.vx;
                spaceship.y += spaceship.vy;

                player.x = spaceship.x;
                player.y = spaceship.y;
                player.angle = spaceship.angle;

                thrustPanelFill.style.width = `${thrustPower * 100}%`;
            } else if (!inShipInterior && !navMenuOpen && currentState === MODE.MAP) { // только на карте можно ходить пешком
                if (joystick.active) {
                    player.vx += joystick.dx * player.speed;
                    player.vy += joystick.dy * player.speed;
                }
                player.vx *= player.friction;
                player.vy *= player.friction;
                const nextX = player.x + player.vx;
                const nextY = player.y + player.vy;
                if (!checkHangarCollision(nextX, player.y, player.size)) player.x = nextX;
                if (!checkHangarCollision(player.x, nextY, player.size)) player.y = nextY;
                if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
                    player.angle = Math.atan2(player.vy, player.vx);
                }
            }

            // === UPDATE PLAYER TRAIL ===
            if (currentState === MODE.MAP && !inShip && !inShipInterior) {
                const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                if (speed > 0.1) {
                    mapTrail.push({ x: player.x, y: player.y, alpha: 1, isShip: false });
                    if (mapTrail.length > mapTrailMaxLength) mapTrail.shift();
                }
                for (let i = 0; i < mapTrail.length; i++) {
                    mapTrail[i].alpha -= 0.01;
                    if (mapTrail[i].alpha <= 0) {
                        mapTrail.splice(i, 1);
                        i--;
                    }
                }
            }

            // === PORTAL COLLISION (только на карте) ===
            if (currentState === MODE.MAP && !inShip && !inShipInterior) {
                const dx = player.x - portal.x;
                const dy = player.y - portal.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < portal.radius + player.size) startTunnel();

                const shopDx = player.x - shopPortal.x;
                const shopDy = player.y - shopPortal.y;
                const shopDist = Math.sqrt(shopDx * shopDx + shopDy * shopDy);
                if (shopDist < shopPortal.radius + player.size) enterShop();
            }

            checkAssembler();
        }

        // === SHIP INTERIOR UPDATE ===
        function updateShipInterior(deltaTime) {
            if (joystick.active) {
                shipInteriorPlayer.vx += joystick.dx * player.speed * 0.8;
                shipInteriorPlayer.vy += joystick.dy * player.speed * 0.8;
            }
            shipInteriorPlayer.vx *= player.friction;
            shipInteriorPlayer.vy *= player.friction;
            const newX = shipInteriorPlayer.x + shipInteriorPlayer.vx;
            const newY = shipInteriorPlayer.y + shipInteriorPlayer.vy;
            if (!checkShipInteriorCollision(newX, shipInteriorPlayer.y, shipInteriorPlayer.size)) shipInteriorPlayer.x = newX;
            if (!checkShipInteriorCollision(shipInteriorPlayer.x, newY, shipInteriorPlayer.size)) shipInteriorPlayer.y = newY;
            if (Math.abs(shipInteriorPlayer.vx) > 0.1 || Math.abs(shipInteriorPlayer.vy) > 0.1) {
                shipInteriorPlayer.angle = Math.atan2(shipInteriorPlayer.vy, shipInteriorPlayer.vx);
            }

            // Кабина
            if (shipInteriorPlayer.x > shipInteriorCockpitZone.x &&
                shipInteriorPlayer.x < shipInteriorCockpitZone.x + shipInteriorCockpitZone.w &&
                shipInteriorPlayer.y > shipInteriorCockpitZone.y &&
                shipInteriorPlayer.y < shipInteriorCockpitZone.y + shipInteriorCockpitZone.h) {
                inCockpitZone = true;
                interactBtn.innerText = "ENTER";
                interactBtn.classList.add('visible');
            } else {
                inCockpitZone = false;
                interactBtn.classList.remove('visible');
            }

            // Выход наружу (зелёная зона) - в космосе неактивна
            if (shipInteriorPlayer.x > shipInteriorExitZone.x &&
                shipInteriorPlayer.x < shipInteriorExitZone.x + shipInteriorExitZone.w &&
                shipInteriorPlayer.y > shipInteriorExitZone.y &&
                shipInteriorPlayer.y < shipInteriorExitZone.y + shipInteriorExitZone.h) {
                
                // Разрешаем выход наружу только если корабль на карте
                if (shipPreviousMode === MODE.MAP) {
                    // Выход на карту
                    inShipInterior = false;
                    currentState = MODE.MAP;
                    player.x = spaceship.x;
                    player.y = spaceship.y + shipConfig.h / 2 + 50;
                    player.vx = 0;
                    player.vy = 0;
                    shipInteriorHint.style.display = 'none';
                    hint.style.display = 'block';
                    hint.innerText = "Fly to the Portal";
                    updatePauseButtonVisibility();
                    updateDriveZonesVisibility();
                } else {
                    // В космосе выйти наружу нельзя (можно добавить звук или сообщение)
                    console.log("Cannot exit in space");
                }
            }
        }

        // === РАДАР ===
        function drawRadar() {
            if (!inShip || !radarCanvas) return;
            const w = radarCanvas.width;
            const h = radarCanvas.height;
            radarCtx.clearRect(0, 0, w, h);

            // Внешняя окружность
            radarCtx.beginPath();
            radarCtx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2);
            radarCtx.strokeStyle = 'rgba(255,255,255,0.3)';
            radarCtx.lineWidth = 3;
            radarCtx.stroke();

            const cx = w/2;
            const cy = h/2;
            const radius = w/2 - 6;

            if (currentState === MODE.MAP) {
                // Маркеры направлений только на карте
                function drawMarker(angle, color) {
                    const x = cx + Math.cos(angle) * radius;
                    const y = cy + Math.sin(angle) * radius;
                    radarCtx.beginPath();
                    radarCtx.arc(x, y, 10, 0, Math.PI*2);
                    radarCtx.fillStyle = color;
                    radarCtx.shadowBlur = 8;
                    radarCtx.shadowColor = color;
                    radarCtx.fill();
                    radarCtx.shadowBlur = 0;
                }

                const angleToPortal = Math.atan2(portal.y - spaceship.y, portal.x - spaceship.x);
                const angleToShop = Math.atan2(shopPortal.y - spaceship.y, shopPortal.x - spaceship.x);
                const angleToBase = Math.atan2((hangar.y + hangar.h/2) - spaceship.y, (hangar.x + hangar.w/2) - spaceship.x);

                drawMarker(angleToPortal, portal.color);
                drawMarker(angleToShop, shopPortal.color);
                drawMarker(angleToBase, '#00FF00');
            } // в космосе пока нет маркеров

            // Кораблик в центре (направление)
            radarCtx.save();
            radarCtx.translate(cx, cy);
            radarCtx.rotate(spaceship.angle);
            radarCtx.beginPath();
            radarCtx.moveTo(25, 0);
            radarCtx.lineTo(-20, -15);
            radarCtx.lineTo(-20, 15);
            radarCtx.closePath();
            radarCtx.fillStyle = getCustomColor('playerColor');
            radarCtx.shadowBlur = 10;
            radarCtx.shadowColor = getCustomColor('playerColor');
            radarCtx.fill();
            radarCtx.shadowBlur = 0;
            radarCtx.restore();
        }

        // === НАВИГАЦИОННОЕ МЕНЮ ===
        function toggleNavMenu() {

        // --- DRAWING ---
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBackground();

            // Затемнение для космоса
            if (currentState === MODE.SPACE) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            const gridSize = 100;
            const offsetX = -player.x % gridSize;
            const offsetY = -player.y % gridSize;

            // Рисуем сетку
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;

            if (currentState === MODE.SPACE) {
                // Треугольная сетка для космоса
                const halfGrid = gridSize / 2;
                // Горизонтальные линии с шагом halfGrid
                for (let y = offsetY; y < canvas.height; y += halfGrid) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                }

                // Линии под 45° (y = x + b)
                let b0 = offsetY - offsetX;
                let minB = -canvas.width;
                let maxB = canvas.height + canvas.width;
                for (let b = b0 - Math.floor((b0 - minB) / gridSize) * gridSize; b < maxB; b += gridSize) {
                    let x1 = 0, y1 = b;
                    let x2 = canvas.width, y2 = b + canvas.width;
                    if (y1 < 0) { x1 = -b; y1 = 0; }
                    if (y2 > canvas.height) { x2 = canvas.height - b; y2 = canvas.height; }
                    if (x1 >= 0 && x1 <= canvas.width && y1 >= 0 && y1 <= canvas.height &&
                        x2 >= 0 && x2 <= canvas.width && y2 >= 0 && y2 <= canvas.height) {
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                }

                // Линии под -45° (y = -x + b)
                b0 = offsetY + offsetX;
                for (let b = b0 - Math.floor((b0 - minB) / gridSize) * gridSize; b < maxB; b += gridSize) {
                    let x1 = 0, y1 = b;
                    let x2 = canvas.width, y2 = b - canvas.width;
                    if (y1 > canvas.height) { x1 = b - canvas.height; y1 = canvas.height; }
                    if (y2 < 0) { x2 = b; y2 = 0; }
                    if (x1 >= 0 && x1 <= canvas.width && y1 >= 0 && y1 <= canvas.height &&
                        x2 >= 0 && x2 <= canvas.width && y2 >= 0 && y2 <= canvas.height) {
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                }
            } else {
                // Обычная квадратная сетка для карты
                for (let x = offsetX; x < canvas.width; x += gridSize) {
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                }
                for (let y = offsetY; y < canvas.height; y += gridSize) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                }
            }
            ctx.stroke();

            ctx.save();
            ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

            // === АНГАР (только на карте) ===
            if (currentState === MODE.MAP) {
                ctx.fillStyle = 'rgba(128,128,128,0.2)';
                ctx.fillRect(hangar.x, hangar.y, hangar.w, hangar.h);
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffffff';
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                for (const wall of hangarWalls) {
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                }
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let x = hangar.x; x <= hangar.x + hangar.w; x += BLOCK_SIZE) {
                    ctx.moveTo(x, hangar.y);
                    ctx.lineTo(x, hangar.y + hangar.h);
                }
                for (let y = hangar.y; y <= hangar.y + hangar.h; y += BLOCK_SIZE) {
                    ctx.moveTo(hangar.x, y);
                    ctx.lineTo(hangar.x + hangar.w, y);
                }
                ctx.stroke();

                ctx.fillStyle = '#333333';
                ctx.fillRect(assembler.x, assembler.y, assembler.w, assembler.h);
                ctx.fillStyle = '#555555';
                for (const wall of assemblerWalls) {
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                }
                ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
                ctx.fillRect(terminalZone.x, terminalZone.y, terminalZone.w, terminalZone.h);
            }

            // Реактивная струя
            if (inShip && thrustPower > 0.01) {
                const trailColor = getCustomColor('trailColor');
                const nozzleOffset = 65;

                const backX = -Math.cos(spaceship.angle);
                const backY = -Math.sin(spaceship.angle);
                const sideX = -Math.sin(spaceship.angle);
                const sideY = Math.cos(spaceship.angle);

                const nozzleX = spaceship.x + backX * nozzleOffset;
                const nozzleY = spaceship.y + backY * nozzleOffset;

                const flicker = Math.random() * 0.1 + 0.95;
                const totalLength = 280 * thrustPower * flicker;
                const widePointDist = totalLength * 0.20;
                const maxWidth = 50 * thrustPower;

                // Точки внешней струи
                const pStart = { x: nozzleX, y: nozzleY };
                const pLeft = {
                    x: nozzleX + backX * widePointDist + sideX * maxWidth,
                    y: nozzleY + backY * widePointDist + sideY * maxWidth
                };
                const pRight = {
                    x: nozzleX + backX * widePointDist - sideX * maxWidth,
                    y: nozzleY + backY * widePointDist - sideY * maxWidth
                };
                const pEnd = {
                    x: nozzleX + backX * totalLength,
                    y: nozzleY + backY * totalLength
                };

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = 0.7 * thrustPower;
                ctx.shadowBlur = 100 * thrustPower;

                // Внешняя струя
                ctx.strokeStyle = trailColor;
                ctx.shadowColor = trailColor;
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pStart.x, pStart.y);
                ctx.lineTo(pLeft.x, pLeft.y);
                ctx.lineTo(pEnd.x, pEnd.y);
                ctx.lineTo(pRight.x, pRight.y);
                ctx.closePath();
                ctx.stroke();

                // Внутренняя струя
                const innerScale = 0.5;
                const innerTotalLength = totalLength * innerScale;
                const innerMaxWidth = maxWidth * innerScale;
                const innerWidePointDist = innerTotalLength * 0.20;

                // Сдвиг старта
                const startOffset = (totalLength - innerTotalLength) / 4;

                const innerStartX = nozzleX + backX * startOffset;
                const innerStartY = nozzleY + backY * startOffset;

                const innerWideX = innerStartX + backX * innerWidePointDist;
                const innerWideY = innerStartY + backY * innerWidePointDist;

                const innerLeftX = innerWideX + sideX * innerMaxWidth;
                const innerLeftY = innerWideY + sideY * innerMaxWidth;
                const innerRightX = innerWideX - sideX * innerMaxWidth;
                const innerRightY = innerWideY - sideY * innerMaxWidth;

                const innerEndX = innerStartX + backX * innerTotalLength;
                const innerEndY = innerStartY + backY * innerTotalLength;

                ctx.strokeStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.lineWidth = 5 * innerScale; // ≈ 2.5
                ctx.beginPath();
                ctx.moveTo(innerStartX, innerStartY);
                ctx.lineTo(innerLeftX, innerLeftY);
                ctx.lineTo(innerEndX, innerEndY);
                ctx.lineTo(innerRightX, innerRightY);
                ctx.closePath();
                ctx.stroke();

                ctx.restore();
            }

            // === КОРАБЛЬ ===
            if (spaceship.built || spaceship.building) {
                ctx.save();
                ctx.translate(spaceship.x, spaceship.y);
                const scale = spaceship.building ? (0.5 + 0.5 * spaceship.alpha) : 1;
                ctx.scale(scale, scale);
                ctx.globalAlpha = spaceship.alpha;
                ctx.rotate(spaceship.angle + Math.PI / 2);
                ctx.fillStyle = getCustomColor('playerColor');
                ctx.shadowBlur = 15;
                ctx.shadowColor = getCustomColor('playerColor');
                ctx.beginPath();
                ctx.moveTo(0, -90); 
                ctx.lineTo(55, 80);
                ctx.lineTo(0, 60);
                ctx.lineTo(-55, 80);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            ctx.restore();

            if (!inShip && currentState === MODE.MAP) drawPlayerTrail();

            // Портал и магазин только на карте
            if (currentState === MODE.MAP) {
                ctx.save();
                ctx.translate(canvas.width / 2 + portal.x - player.x, canvas.height / 2 + portal.y - player.y);
                ctx.beginPath();
                ctx.arc(0, 0, portal.radius, 0, Math.PI * 2);
                ctx.strokeStyle = portal.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = portal.color;
                ctx.stroke();
                ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.translate(canvas.width / 2 + shopPortal.x - player.x, canvas.height / 2 + shopPortal.y - player.y);
                ctx.beginPath();
                ctx.arc(0, 0, shopPortal.radius, 0, Math.PI * 2);
                ctx.strokeStyle = shopPortal.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = shopPortal.color;
                ctx.stroke();
                ctx.fillStyle = 'rgba(255, 68, 68, 0.2)';
                ctx.fill();
                ctx.restore();
            }

            // Игрок (пешком) только на карте
            if (!inShip && !inShipInterior && currentState === MODE.MAP) {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(player.angle);
                ctx.beginPath();
                ctx.moveTo(player.size, 0);
                ctx.lineTo(-player.size, -player.size / 1.5);
                ctx.lineTo(-player.size, player.size / 1.5);
                ctx.closePath();
                ctx.fillStyle = getCustomColor('playerColor');
                ctx.shadowBlur = 15;
                ctx.shadowColor = getCustomColor('playerColor');
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // Компас рисуется только на карте и при ходьбе
            if (!inShip && currentState === MODE.MAP) {
                drawCompass();
            }
        }

        function drawPlayerTrail() {
            if (mapTrail.length < 2) return;
            const trailColor = getCustomColor('trailColor');
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for (let i = 1; i < mapTrail.length; i++) {
                const point = mapTrail[i];
                const prevPoint = mapTrail[i - 1];
                const alpha = point.alpha * 0.6;
                ctx.beginPath();
                ctx.moveTo(prevPoint.x - player.x, prevPoint.y - player.y);
                ctx.lineTo(point.x - player.x, point.y - player.y);
                ctx.strokeStyle = trailColor;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 3 + (i / mapTrail.length) * 4;
                ctx.shadowBlur = 10 * alpha;
                ctx.shadowColor = trailColor;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawCompass() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const compassRadius = 60;
            const markerWidth = 3;
            const markerArc = Math.PI / 6;
            const dx1 = portal.x - player.x;
            const dy1 = portal.y - player.y;
            const angleToPortal = Math.atan2(dy1, dx1);
            const dx2 = shopPortal.x - player.x;
            const dy2 = shopPortal.y - player.y;
            const angleToShop = Math.atan2(dy2, dx2);
            const dx3 = (hangar.x + hangar.w / 2) - player.x;
            const dy3 = (hangar.y + hangar.h / 2) - player.y;
            const angleToBase = Math.atan2(dy3, dx3);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, angleToPortal - markerArc / 2, angleToPortal + markerArc / 2);
            ctx.strokeStyle = portal.color;
            ctx.lineWidth = markerWidth;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = portal.color;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, angleToShop - markerArc / 2, angleToShop + markerArc / 2);
            ctx.strokeStyle = shopPortal.color;
            ctx.lineWidth = markerWidth;
            ctx.shadowBlur = 10;
            ctx.shadowColor = shopPortal.color;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, angleToBase - markerArc / 2, angleToBase + markerArc / 2);
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = markerWidth;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00FF00';
            ctx.stroke();
            ctx.restore();
        }

        function drawShop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBackground();
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(shopCamera.zoom, shopCamera.zoom);
            ctx.translate(-shopPlayer.x, -shopPlayer.y);
            const halfGrid = (shopConfig.gridCount * shopConfig.gridSize) / 2;
            ctx.fillStyle = 'rgba(128,128,128,0.2)';
            ctx.fillRect(-halfGrid, -halfGrid, shopConfig.gridCount * shopConfig.gridSize, shopConfig.gridCount * shopConfig.gridSize);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let x = -halfGrid; x <= halfGrid; x += shopConfig.gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, -halfGrid);
                ctx.lineTo(x, halfGrid);
                ctx.stroke();
            }
            for (let y = -halfGrid; y <= halfGrid; y += shopConfig.gridSize) {
                ctx.beginPath();
                ctx.moveTo(-halfGrid, y);
                ctx.lineTo(halfGrid, y);
                ctx.stroke();
            }
            for (const [key, shop] of Object.entries(shopZones)) {
                const isActive = (currentShop === key);
                const x = shop.x;
                const y = shop.y;
                const w = shop.w;
                const h = shop.h;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffffff';
                ctx.strokeRect(x, y, w, h);
                ctx.shadowBlur = 0;
                if (isActive) {
                    const cr = shop.cashRegister;
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.5)';
                    ctx.fillRect(cr.x, cr.y, cr.w, cr.h);
                }
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(shop.name, x + w / 2, y + h / 2);
            }
            ctx.save();
            ctx.translate(shopPlayer.x, shopPlayer.y);
            ctx.rotate(shopPlayer.angle);
            ctx.beginPath();
            ctx.moveTo(shopPlayer.size, 0);
            ctx.lineTo(-shopPlayer.size, -shopPlayer.size / 1.5);
            ctx.lineTo(-shopPlayer.size, shopPlayer.size / 1.5);
            ctx.closePath();
            ctx.fillStyle = getCustomColor('playerColor');
            ctx.shadowBlur = 15;
            ctx.shadowColor = getCustomColor('playerColor');
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
            ctx.restore();
        }

        function drawShipInterior() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.fillStyle = '#111111';
            for (const wall of shipInteriorWalls) {
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
            }
            ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
            ctx.fillRect(shipInteriorCockpitZone.x, shipInteriorCockpitZone.y, shipInteriorCockpitZone.w, shipInteriorCockpitZone.h);
            ctx.fillStyle = shipInteriorExitZone.color;
            ctx.fillRect(shipInteriorExitZone.x, shipInteriorExitZone.y, shipInteriorExitZone.w, shipInteriorExitZone.h);
            ctx.save();
            ctx.translate(shipInteriorPlayer.x, shipInteriorPlayer.y);
            ctx.rotate(shipInteriorPlayer.angle);
            ctx.beginPath();
            ctx.moveTo(shipInteriorPlayer.size, 0);
            ctx.lineTo(-shipInteriorPlayer.size, -shipInteriorPlayer.size / 1.5);
            ctx.lineTo(-shipInteriorPlayer.size, shipInteriorPlayer.size / 1.5);
            ctx.closePath();
            ctx.fillStyle = getCustomColor('playerColor');
            ctx.shadowBlur = 15;
            ctx.shadowColor = getCustomColor('playerColor');
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
            ctx.restore();
        }

        function drawTunnel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBackground();
            ctx.save();
            ctx.shadowBlur = 100;
            ctx.shadowColor = getCustomColor('tunnelColor');
            ctx.strokeStyle = getCustomColor('tunnelColor');
            ctx.lineWidth = 5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            tunnelPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
            ctx.beginPath();
            tunnelPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y + tunnelGap);
                else ctx.lineTo(p.x, p.y + tunnelGap);
            });
            ctx.stroke();
            if (tunnelTrail.length > 1) {
                ctx.shadowBlur = 30;
                ctx.strokeStyle = getCustomColor('trailColor');
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(tunnelTrail[0].x, tunnelTrail[0].y);
                tunnelTrail.forEach(t => ctx.lineTo(t.x, t.y));
                ctx.stroke();
            }
            ctx.save();
            ctx.translate(playerX, tunnelPlayerY);
            let angle = 0;
            if (tunnelDirection === 1) angle = -Math.PI / 4;
            else if (tunnelDirection === -1) angle = Math.PI / 4;
            ctx.rotate(angle);
            ctx.shadowBlur = 50;
            ctx.shadowColor = getCustomColor('playerColor');
            ctx.fillStyle = getCustomColor('playerColor');
            ctx.beginPath();
            ctx.moveTo(22, 0);
            ctx.lineTo(-12, -13);
            ctx.lineTo(-12, 13);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            ctx.restore();
        }

        // --- MAIN LOOP ---
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;

            if (currentState === MODE.MAP || currentState === MODE.SPACE) {
                updateMap(deltaTime);
                drawMap();
                if (inShip) drawRadar();
            } else if (currentState === MODE.TUNNEL) {
                updateTunnel(deltaTime);
                drawTunnel();
            } else if (currentState === MODE.SHOP) {
                updateShop(deltaTime);
                drawShop();
            } else if (currentState === MODE.SHIP_INTERIOR) {
                updateShipInterior(deltaTime);
                drawShipInterior();
            }
            if (currentState !== MODE.PAUSED) {
                requestAnimationFrame(loop);
            }
        }

        // Старт
        updatePauseButtonVisibility();
        updateDriveZonesVisibility();
        requestAnimationFrame(loop);
    </script>
</body>
